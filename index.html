<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { overscroll-behavior-y: contain; }
        input[type="number"], input[type="text"], input[type="password"], select { font-size: 16px; }
        .hidden { display: none; }
        /* Hide scrollbar for category tabs but allow swiping */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased pb-20">

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- App Title -->
        <h1 class="text-4xl font-extrabold text-center text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-blue-500 mt-2 mb-4">CALculator</h1>
        
        <!-- Header / Total Display -->
        <div class="bg-gray-800 rounded-xl p-6 shadow-lg border border-gray-700 sticky top-4 z-10">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-bold text-gray-300">Current Meal</h2>
                <button onclick="clearPlate()" class="text-sm bg-red-600/20 text-red-400 px-3 py-1 rounded-md hover:bg-red-600/40 transition">Clear</button>
            </div>
            <div class="flex gap-4">
                <div onclick="copyCalories()" class="flex-1 bg-gray-900 p-3 rounded-lg border border-gray-700 text-center cursor-pointer hover:bg-gray-800 transition active:scale-95 group">
                    <div class="text-sm text-gray-400 group-hover:text-gray-300 transition">Calories <span class="text-xs opacity-50">(tap)</span></div>
                    <div id="total-cal" class="text-2xl font-bold text-emerald-400 transition-colors duration-200">0</div>
                </div>
                <div class="flex-1 bg-gray-900 p-3 rounded-lg border border-gray-700 text-center">
                    <div class="text-sm text-gray-400">Protein (g)</div>
                    <div id="total-prot" class="text-2xl font-bold text-blue-400">0</div>
                </div>
            </div>
        </div>

        <!-- Active Plate List -->
        <div id="plate-list" class="space-y-2"></div>

        <hr class="border-gray-700">

        <!-- Add Custom Value -->
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
            <h3 class="font-bold text-gray-300 mb-3">Add Custom Value</h3>
            <div class="flex gap-2">
                <input type="number" id="custom-cal" inputmode="numeric" pattern="[0-9]*" placeholder="Kcal" class="w-full bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:outline-none">
                <input type="number" id="custom-prot" inputmode="numeric" pattern="[0-9]*" placeholder="Protein" class="w-full bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:outline-none">
                <button onclick="addCustom()" class="bg-emerald-600 px-4 py-2 rounded-lg font-bold hover:bg-emerald-500">+</button>
            </div>
        </div>

        <!-- Product Database -->
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-gray-300">Food Database</h3>
                <button onclick="syncWithGitHub()" id="sync-btn" class="text-sm bg-blue-600/20 text-blue-400 px-3 py-1 rounded-md hover:bg-blue-600/40 transition flex items-center gap-2">
                    <span id="sync-status">Sync</span>
                </button>
            </div>

            <!-- Top-Level Category Filter Tabs -->
            <div class="flex gap-2 mb-3 overflow-x-auto hide-scrollbar pb-1">
                <button onclick="setCategoryFilter('All')" data-cat="All" class="cat-pill whitespace-nowrap bg-emerald-600 text-white px-4 py-1.5 rounded-full text-sm font-bold transition">All</button>
                <button onclick="setCategoryFilter('Ingredients')" data-cat="Ingredients" class="cat-pill whitespace-nowrap bg-gray-700 text-gray-300 px-4 py-1.5 rounded-full text-sm font-bold transition hover:bg-gray-600">Ingredients</button>
                <button onclick="setCategoryFilter('Snacks')" data-cat="Snacks" class="cat-pill whitespace-nowrap bg-gray-700 text-gray-300 px-4 py-1.5 rounded-full text-sm font-bold transition hover:bg-gray-600">Snacks</button>
                <button onclick="setCategoryFilter('Drinks')" data-cat="Drinks" class="cat-pill whitespace-nowrap bg-gray-700 text-gray-300 px-4 py-1.5 rounded-full text-sm font-bold transition hover:bg-gray-600">Drinks</button>
                <!-- ADD NEW CATEGORIES HERE (Buttons): Just copy the line above and change 'Snacks' to your new category name -->
            </div>
            
            <div class="flex gap-2 mb-4">
                <input type="text" id="search-db" onkeyup="renderDb()" placeholder="Search brand, name..." class="flex-1 bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:border-emerald-500 focus:outline-none">
                <select id="sort-order" onchange="renderDb()" class="bg-gray-900 text-white px-2 py-2 rounded-lg border border-gray-700 focus:outline-none text-sm">
                    <option value="recent">Recent</option>
                    <option value="name">A-Z Name</option>
                    <option value="brand">A-Z Brand</option>
                </select>
            </div>
            
            <div id="db-list" class="space-y-2 max-h-72 overflow-y-auto pr-2"></div>
        </div>

        <!-- Add New Product to DB -->
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
            <h3 class="font-bold text-gray-300 mb-3">Create New Food</h3>
            <div class="space-y-2">
                <!-- Category Selector -->
                <select id="new-category" class="w-full bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 mb-2 font-bold">
                    <option value="Ingredients">Category: Ingredient</option>
                    <option value="Snacks">Category: Snack</option>
                    <!-- ADD NEW CATEGORIES HERE (Dropdown): Just copy the line above and change the text -->
                </select>

                <div class="flex gap-2">
                    <input type="text" id="new-brand" placeholder="Brand" class="w-1/3 bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:outline-none">
                    <input type="text" id="new-name" placeholder="Official Name" class="w-2/3 bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:outline-none">
                </div>
                <input type="text" id="new-custom" placeholder="Custom Name (optional shorthand)" class="w-full bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:outline-none text-sm text-emerald-400">
                <div class="flex gap-2">
                    <input type="number" id="new-cal" inputmode="decimal" placeholder="Kcal/100g" class="w-full bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:outline-none border-emerald-900">
                    <input type="number" id="new-prot" inputmode="decimal" placeholder="Protein/100g" class="w-full bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:outline-none border-blue-900">
                </div>
                <button onclick="addToDb()" class="w-full bg-blue-600 py-2 rounded-lg font-bold hover:bg-blue-500 transition mt-2">Save & Sync</button>
            </div>
        </div>

        <!-- Cloud Settings -->
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 mb-10">
            <button onclick="toggleSettings()" class="w-full text-left font-bold text-gray-300 flex justify-between">
                <span>GitHub Sync Settings</span>
                <span>▼</span>
            </button>
            <div id="settings-panel" class="hidden mt-4 space-y-2">
                <input type="password" id="gh-token" placeholder="GitHub PAT Token" class="w-full bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:outline-none text-sm">
                <input type="text" id="gh-gist" placeholder="Gist ID" class="w-full bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:outline-none text-sm">
                <button onclick="saveSettings()" class="w-full bg-gray-700 py-2 rounded-lg font-bold hover:bg-gray-600 transition">Save Credentials</button>
            </div>
        </div>

    </div>

    <!-- Weight Entry Modal -->
    <div id="weight-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-gray-800 rounded-xl p-6 w-full max-w-xs border border-gray-700 shadow-2xl transform transition-all">
            <h3 id="weight-modal-title" class="text-xl font-bold text-emerald-400 mb-4 text-center">Enter Weight</h3>
            <input type="number" id="weight-input" inputmode="numeric" pattern="[0-9]*" placeholder="Grams" class="w-full bg-gray-900 text-white text-3xl px-4 py-4 rounded-lg border border-gray-700 focus:border-emerald-500 focus:outline-none mb-6 text-center font-bold placeholder-gray-600">
            <div class="flex gap-3">
                <button onclick="closeWeightModal()" class="flex-1 bg-gray-700 py-3 rounded-lg font-bold hover:bg-gray-600 transition text-gray-300">Cancel</button>
                <button onclick="confirmWeight()" class="flex-1 bg-emerald-600 py-3 rounded-lg font-bold hover:bg-emerald-500 transition text-white">Add to Plate</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let db = JSON.parse(localStorage.getItem('foodDb')) || [];
        let plate = JSON.parse(localStorage.getItem('foodPlate')) || [];
        let ghToken = localStorage.getItem('ghToken') || '';
        let ghGistId = localStorage.getItem('ghGistId') || '';
        let currentWeightDbId = null;
        let activeCategoryFilter = 'All'; // New State for Category Tracking

        // Category Tab Switcher
        function setCategoryFilter(cat) {
            activeCategoryFilter = cat;
            
            // Visually update the pill buttons
            document.querySelectorAll('.cat-pill').forEach(btn => {
                if (btn.dataset.cat === cat) {
                    btn.classList.remove('bg-gray-700', 'text-gray-300');
                    btn.classList.add('bg-emerald-600', 'text-white');
                } else {
                    btn.classList.remove('bg-emerald-600', 'text-white');
                    btn.classList.add('bg-gray-700', 'text-gray-300');
                }
            });
            renderDb();
        }

        // Keyboard "Enter" listener for Modal
        document.getElementById('weight-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') confirmWeight();
        });

        // Copy to Clipboard feature
        async function copyCalories() {
            const calText = document.getElementById('total-cal').innerText;
            if (calText === "0") return;
            try {
                await navigator.clipboard.writeText(calText);
                const calDiv = document.getElementById('total-cal');
                calDiv.classList.remove('text-emerald-400');
                calDiv.classList.add('text-white', 'bg-emerald-500', 'rounded', 'px-2');
                setTimeout(() => {
                    calDiv.classList.remove('text-white', 'bg-emerald-500', 'rounded', 'px-2');
                    calDiv.classList.add('text-emerald-400');
                }, 400);
            } catch (err) {
                console.error('Failed to copy', err);
            }
        }

        // GitHub Sync Logic
        async function syncWithGitHub(isPushing = false) {
            if (!ghToken || !ghGistId) return;
            const syncBtn = document.getElementById('sync-status');
            syncBtn.innerText = "Syncing...";

            try {
                const response = await fetch(`https://api.github.com/gists/${ghGistId}`, {
                    headers: { 'Authorization': `token ${ghToken}` }
                });
                const gist = await response.json();
                const remoteDbStr = gist.files['foodDb.json']?.content;
                const remoteDb = remoteDbStr ? JSON.parse(remoteDbStr) : [];

                const mergedMap = new Map();
                [...remoteDb, ...db].forEach(item => {
                    if (!item.lastUsed) item.lastUsed = 0;
                    if (mergedMap.has(item.id)) {
                        const existing = mergedMap.get(item.id);
                        if (item.lastUsed > existing.lastUsed) mergedMap.set(item.id, item);
                    } else {
                        mergedMap.set(item.id, item);
                    }
                });
                db = Array.from(mergedMap.values());
                localStorage.setItem('foodDb', JSON.stringify(db));

                if (isPushing || JSON.stringify(remoteDb) !== JSON.stringify(db)) {
                    await fetch(`https://api.github.com/gists/${ghGistId}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `token ${ghToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            files: { 'foodDb.json': { content: JSON.stringify(db, null, 2) } }
                        })
                    });
                }
                renderDb();
                syncBtn.innerText = "✓ Synced";
                setTimeout(() => syncBtn.innerText = "Sync", 2000);
            } catch (error) {
                syncBtn.innerText = "✕ Error";
                setTimeout(() => syncBtn.innerText = "Sync", 2000);
            }
        }

        // Settings Logic
        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) {
                document.getElementById('gh-token').value = ghToken;
                document.getElementById('gh-gist').value = ghGistId;
            }
        }

        function saveSettings() {
            ghToken = document.getElementById('gh-token').value;
            ghGistId = document.getElementById('gh-gist').value;
            localStorage.setItem('ghToken', ghToken);
            localStorage.setItem('ghGistId', ghGistId);
            toggleSettings();
            syncWithGitHub();
        }

        function saveState() {
            localStorage.setItem('foodPlate', JSON.stringify(plate));
            localStorage.setItem('foodDb', JSON.stringify(db));
            renderAll();
        }

        // ADD NEW FOOD (Updated with Category)
        function addToDb() {
            const category = document.getElementById('new-category').value;
            const brand = document.getElementById('new-brand').value.trim();
            const name = document.getElementById('new-name').value.trim();
            const customName = document.getElementById('new-custom').value.trim();
            const cal = parseFloat(document.getElementById('new-cal').value);
            const prot = parseFloat(document.getElementById('new-prot').value) || 0;

            if (!name || isNaN(cal)) return alert("Official Name and Calories are required.");

            db.push({ 
                id: Date.now(), 
                category: category, 
                brand: brand, 
                name: name, 
                customName: customName, 
                calPer100: cal, 
                protPer100: prot,
                lastUsed: Date.now() 
            });
            
            document.getElementById('new-brand').value = '';
            document.getElementById('new-name').value = '';
            document.getElementById('new-custom').value = '';
            document.getElementById('new-cal').value = '';
            document.getElementById('new-prot').value = '';
            
            saveState();
            
            // Automatically switch to the category tab where they just created the food
            if (activeCategoryFilter !== 'All' && activeCategoryFilter !== category) {
                setCategoryFilter(category);
            }

            if(ghToken) syncWithGitHub(true);
        }

        async function deleteFromDb(dbId) {
            if(confirm("Delete this food from database?")) {
                db = db.filter(item => item.id !== dbId);
                saveState();

                if(ghToken && ghGistId) {
                    const syncBtn = document.getElementById('sync-status');
                    syncBtn.innerText = "Deleting...";
                    try {
                        const response = await fetch(`https://api.github.com/gists/${ghGistId}`, {
                            headers: { 'Authorization': `token ${ghToken}` }
                        });
                        const gist = await response.json();
                        let remoteDbStr = gist.files['foodDb.json']?.content;
                        let remoteDb = remoteDbStr ? JSON.parse(remoteDbStr) : [];
                        remoteDb = remoteDb.filter(item => item.id !== dbId);
                        await fetch(`https://api.github.com/gists/${ghGistId}`, {
                            method: 'PATCH',
                            headers: {
                                'Authorization': `token ${ghToken}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                files: { 'foodDb.json': { content: JSON.stringify(remoteDb, null, 2) } }
                            })
                        });
                        syncBtn.innerText = "✓ Deleted";
                        setTimeout(() => syncBtn.innerText = "Sync", 2000);
                    } catch (error) {
                        syncBtn.innerText = "✕ Error";
                        setTimeout(() => syncBtn.innerText = "Sync", 2000);
                    }
                }
            }
        }

        function triggerAddWeight(dbId) {
            currentWeightDbId = dbId;
            const food = db.find(f => f.id === dbId);
            const primaryName = food.customName ? food.customName : food.name;
            
            document.getElementById('weight-modal-title').innerText = `${primaryName} (g)`;
            const input = document.getElementById('weight-input');
            input.value = '';
            document.getElementById('weight-modal').classList.remove('hidden');
            setTimeout(() => input.focus(), 50);
        }

        function closeWeightModal() {
            document.getElementById('weight-modal').classList.add('hidden');
            document.getElementById('weight-input').blur();
            currentWeightDbId = null;
        }

        function confirmWeight() {
            if (!currentWeightDbId) return;
            const weightInput = document.getElementById('weight-input').value;
            const weight = parseFloat(weightInput);
            
            if (!weight || isNaN(weight)) {
                alert("Please enter a valid weight in grams.");
                document.getElementById('weight-input').focus();
                return;
            }

            const foodIndex = db.findIndex(f => f.id === currentWeightDbId);
            if(foodIndex === -1) return;
            
            const food = db[foodIndex];
            food.lastUsed = Date.now();
            db[foodIndex] = food;

            const totalCal = (food.calPer100 / 100) * weight;
            const totalProt = (food.protPer100 / 100) * weight;
            const displayName = food.customName ? food.customName : (food.brand ? `${food.brand} ${food.name}` : food.name);

            plate.push({
                id: Date.now(),
                name: `${displayName} (${weight}g)`,
                totalCal: totalCal,
                totalProt: totalProt
            });
            
            closeWeightModal();
            saveState();
            if(ghToken) syncWithGitHub(true);
        }

        function addCustom() {
            const cal = parseFloat(document.getElementById('custom-cal').value);
            const prot = parseFloat(document.getElementById('custom-prot').value) || 0;
            if (isNaN(cal)) return;

            plate.push({ id: Date.now(), name: "Custom Entry", totalCal: cal, totalProt: prot });
            document.getElementById('custom-cal').value = '';
            document.getElementById('custom-prot').value = '';
            saveState();
        }

        function removeFromPlate(plateId) {
            plate = plate.filter(item => item.id !== plateId);
            saveState();
        }

        function clearPlate() {
            if(confirm("Clear current meal?")) {
                plate = [];
                saveState();
            }
        }

        function renderAll() {
            renderDb();
            renderPlate();
        }

        // RENDER DATABASE (Updated with Category Filtering)
        function renderDb() {
            const search = document.getElementById('search-db').value.toLowerCase();
            const sortOrder = document.getElementById('sort-order').value;
            const list = document.getElementById('db-list');
            list.innerHTML = '';

            let sortedDb = [...db];
            if (sortOrder === 'recent') {
                sortedDb.sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
            } else if (sortOrder === 'name') {
                sortedDb.sort((a, b) => {
                    const nameA = (a.customName || a.name).toLowerCase();
                    const nameB = (b.customName || b.name).toLowerCase();
                    return nameA.localeCompare(nameB);
                });
            } else if (sortOrder === 'brand') {
                sortedDb.sort((a, b) => {
                    const brandA = (a.brand || '').toLowerCase();
                    const brandB = (b.brand || '').toLowerCase();
                    return brandA.localeCompare(brandB) || a.name.localeCompare(b.name);
                });
            }

            const filtered = sortedDb.filter(f => {
                // Determine item category (default to Ingredients for legacy items)
                const itemCat = f.category || 'Ingredients';
                
                // 1. Filter by Category Tab
                if (activeCategoryFilter !== 'All' && itemCat !== activeCategoryFilter) return false;

                // 2. Filter by Search Text
                const searchStr = `${f.brand || ''} ${f.name} ${f.customName || ''}`.toLowerCase();
                return searchStr.includes(search);
            });

            filtered.forEach(food => {
                let primaryName = food.customName ? food.customName : food.name;
                let secondaryName = food.customName ? `${food.brand || ''} ${food.name}`.trim() : (food.brand || '');
                const itemCat = food.category || 'Ingredients';
                
                // Show a tiny category badge next to the name if we are looking at the "All" tab
                const badgeHtml = activeCategoryFilter === 'All' ? 
                    `<span class="text-[9px] uppercase tracking-wider border border-gray-600 text-gray-400 px-1.5 py-0.5 rounded ml-2 align-middle">${itemCat}</span>` : '';

                list.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-900 p-3 rounded-lg border border-gray-700">
                        <div class="flex-1 cursor-pointer" onclick="triggerAddWeight(${food.id})">
                            <div class="font-bold text-emerald-400 text-lg flex items-center flex-wrap gap-y-1">
                                <span>${primaryName}</span> ${badgeHtml}
                            </div>
                            ${secondaryName ? `<div class="text-xs text-gray-400 mb-1 mt-0.5">${secondaryName}</div>` : ''}
                            <div class="text-xs text-gray-500 font-mono">${food.calPer100} kcal | ${food.protPer100}g prot <span class="text-gray-700">(per 100g)</span></div>
                        </div>
                        <button onclick="deleteFromDb(${food.id})" class="text-gray-600 hover:text-red-400 px-3 py-2">✕</button>
                    </div>
                `;
            });
        }

        function renderPlate() {
            const list = document.getElementById('plate-list');
            let sumCal = 0; let sumProt = 0;
            list.innerHTML = '';

            plate.forEach(item => {
                sumCal += item.totalCal; sumProt += item.totalProt;
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-800 p-3 rounded-lg border border-gray-600 shadow-sm">
                        <div>
                            <div class="font-bold text-gray-200">${item.name}</div>
                            <div class="text-sm text-emerald-500 font-mono">${item.totalCal.toFixed(0)} kcal | <span class="text-blue-400">${item.totalProt.toFixed(1)}g prot</span></div>
                        </div>
                        <button onclick="removeFromPlate(${item.id})" class="bg-red-900/50 text-red-400 w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-800/80 transition">✕</button>
                    </div>
                `;
            });

            document.getElementById('total-cal').innerText = sumCal.toFixed(0);
            document.getElementById('total-prot').innerText = sumProt.toFixed(1);
        }

        // Init
        renderAll();
        if(ghToken && ghGistId) syncWithGitHub();
    </script>
</body>
</html>
