<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { overscroll-behavior-y: contain; }
        input[type="number"], input[type="text"], input[type="password"], select { font-size: 16px; }
        .hidden { display: none; }
        /* Hide scrollbar for category tabs but allow swiping */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Light Theme ── */
        body[data-theme="light"] { background-color: #f3f4f6; }
        body[data-theme="light"] .bg-gray-900 { background-color: #f3f4f6 !important; }
        body[data-theme="light"] .bg-gray-800 { background-color: #ffffff !important; }
        body[data-theme="light"] .bg-gray-700 { background-color: #e5e7eb !important; }
        body[data-theme="light"] .hover\:bg-gray-600:hover { background-color: #d1d5db !important; }
        body[data-theme="light"] .text-white { color: #111827 !important; }
        body[data-theme="light"] .text-gray-200 { color: #1f2937 !important; }
        body[data-theme="light"] .text-gray-300 { color: #374151 !important; }
        body[data-theme="light"] .text-gray-400 { color: #6b7280 !important; }
        body[data-theme="light"] .text-gray-500 { color: #9ca3af !important; }
        body[data-theme="light"] .text-gray-600 { color: #b0b9c5 !important; }
        body[data-theme="light"] .text-gray-700 { color: #d1d5db !important; }
        body[data-theme="light"] .border-gray-700 { border-color: #e5e7eb !important; }
        body[data-theme="light"] .border-gray-600 { border-color: #d1d5db !important; }
        
        /* ── Pink Theme ── */
        body[data-theme="pink"] { background-color: #fdf2f8; }
        body[data-theme="pink"] .bg-gray-900 { background-color: #fce7f3 !important; }
        body[data-theme="pink"] .bg-gray-800 { background-color: #fff0f7 !important; }
        body[data-theme="pink"] .bg-gray-700 { background-color: #fbcfe8 !important; }
        body[data-theme="pink"] .hover\:bg-gray-600:hover { background-color: #f9a8d4 !important; }
        body[data-theme="pink"] .text-white { color: #500724 !important; }
        body[data-theme="pink"] .text-gray-200 { color: #881337 !important; }
        body[data-theme="pink"] .text-gray-300 { color: #9d174d !important; }
        body[data-theme="pink"] .text-gray-400 { color: #be185d !important; }
        body[data-theme="pink"] .text-gray-500 { color: #db2777 !important; }
        body[data-theme="pink"] .text-gray-600 { color: #ec4899 !important; }
        body[data-theme="pink"] .text-gray-700 { color: #f9a8d4 !important; }
        body[data-theme="pink"] .border-gray-700 { border-color: #f9a8d4 !important; }
        body[data-theme="pink"] .border-gray-600 { border-color: #fbcfe8 !important; }
        
        /* ── Red Theme ── */
        body[data-theme="red"] { background-color: #150208; }
        body[data-theme="red"] .bg-gray-900 { background-color: #150208 !important; }
        body[data-theme="red"] .bg-gray-800 { background-color: #280a12 !important; }
        body[data-theme="red"] .bg-gray-700 { background-color: #3f1020 !important; }
        body[data-theme="red"] .hover\:bg-gray-600:hover { background-color: #5a1a2e !important; }
        body[data-theme="red"] .text-white { color: #fdf0f3 !important; }
        body[data-theme="red"] .text-gray-200 { color: #f5c6d0 !important; }
        body[data-theme="red"] .text-gray-300 { color: #e8a0b0 !important; }
        body[data-theme="red"] .text-gray-400 { color: #c97a8e !important; }
        body[data-theme="red"] .text-gray-500 { color: #a05268 !important; }
        body[data-theme="red"] .text-gray-600 { color: #7a3348 !important; }
        body[data-theme="red"] .text-gray-700 { color: #5a1a2e !important; }
        body[data-theme="red"] .border-gray-700 { border-color: #5a1a2e !important; }
        body[data-theme="red"] .border-gray-600 { border-color: #7a3348 !important; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased pb-32">

    <div class="max-w-md mx-auto p-4 pt-4 pb-24">
        
        <div class="text-center mb-6">
            <div class="relative inline-block">
                <h1 id="app-header-title" class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-blue-500 transition-all duration-200">CALculator</h1>
                <span id="app-version" class="absolute bottom-0.5 -right-10 text-[10px] text-gray-500 font-bold tracking-wider">v2.0.3</span>
            </div>
        </div>

        <div id="screen-home" class="space-y-6 block transition-opacity">
            
            <div class="bg-gray-800 rounded-xl p-6 shadow-lg border border-gray-700">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-xl font-bold text-gray-300">Current Meal</h2>
                    <button onclick="clearPlate()" class="text-sm bg-red-600/20 text-red-400 px-3 py-1 rounded-md hover:bg-red-600/40 transition">Clear</button>
                </div>
                <div class="flex gap-4">
                    <div onclick="copyCalories()" class="flex-1 bg-gray-900 p-3 rounded-lg border border-gray-700 text-center cursor-pointer hover:bg-gray-800 transition active:scale-95 group">
                        <div class="text-sm text-gray-400 group-hover:text-gray-300 transition">Calories <span class="text-xs opacity-50">(tap)</span></div>
                        <div id="total-cal" class="text-2xl font-bold text-emerald-400 transition-colors duration-200">0</div>
                    </div>
                    <div class="flex-1 bg-gray-900 p-3 rounded-lg border border-gray-700 text-center">
                        <div class="text-sm text-gray-400">Protein (g)</div>
                        <div id="total-prot" class="text-2xl font-bold text-blue-400">0</div>
                    </div>
                </div>
            </div>

            <div id="plate-list" class="space-y-2"></div>

            <hr class="border-gray-700">

            <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-2">
                        <h3 class="font-bold text-gray-300">Food Database</h3>
                        <button onclick="syncWithGitHub()" id="sync-btn" class="text-sm bg-blue-600/20 text-blue-400 px-3 py-1 rounded-md hover:bg-blue-600/40 transition flex items-center gap-2">
                            <span id="sync-status">Sync</span>
                        </button>
                    </div>
                </div>
                <div id="db-content">
                    <div class="flex gap-2 mb-3 overflow-x-auto hide-scrollbar pb-1">
                        <button onclick="setCategoryFilter('All')" data-cat="All" class="cat-pill whitespace-nowrap bg-emerald-600 text-white px-4 py-1.5 rounded-full text-sm font-bold transition">All</button>
                        <button onclick="setCategoryFilter('Meals')" data-cat="Meals" class="cat-pill whitespace-nowrap bg-gray-700 text-gray-300 px-4 py-1.5 rounded-full text-sm font-bold transition hover:bg-gray-600">Meals</button>
                        <button onclick="setCategoryFilter('Vegetables')" data-cat="Vegetables" class="cat-pill whitespace-nowrap bg-gray-700 text-gray-300 px-4 py-1.5 rounded-full text-sm font-bold transition hover:bg-gray-600">Vegetables</button>
                        <button onclick="setCategoryFilter('Ingredients')" data-cat="Ingredients" class="cat-pill whitespace-nowrap bg-gray-700 text-gray-300 px-4 py-1.5 rounded-full text-sm font-bold transition hover:bg-gray-600">Ingredients</button>
                        <button onclick="setCategoryFilter('Snacks')" data-cat="Snacks" class="cat-pill whitespace-nowrap bg-gray-700 text-gray-300 px-4 py-1.5 rounded-full text-sm font-bold transition hover:bg-gray-600">Snacks</button>
                        <button onclick="setCategoryFilter('Drinks')" data-cat="Drinks" class="cat-pill whitespace-nowrap bg-gray-700 text-gray-300 px-4 py-1.5 rounded-full text-sm font-bold transition hover:bg-gray-600">Drinks</button>
                    </div>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="search-db" onkeyup="renderDb()" placeholder="Search brand, name..." class="flex-1 bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:border-emerald-500 focus:outline-none">
                        <select id="sort-order" onchange="renderDb()" class="bg-gray-900 text-white px-2 py-2 rounded-lg border border-gray-700 focus:outline-none text-sm">
                            <option value="recent">Recent</option>
                            <option value="name">A-Z Name</option>
                            <option value="brand">A-Z Brand</option>
                        </select>
                    </div>
                    <div id="db-list" class="space-y-2"></div> 
                </div>
            </div>
            <button id="scroll-top-btn" onclick="scrollToTop()" class="hidden fixed bottom-20 right-4 bg-emerald-600 hover:bg-emerald-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-2xl z-30 transition-all duration-200 active:scale-95">
                <span class="text-sm font-bold">▲</span>
            </button>
        </div>

        <div id="screen-custom" class="hidden space-y-4">
            <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
                <div class="space-y-6 mt-2">
                    <div class="flex gap-2">
                        <div class="relative w-1/2">
                            <input type="number" id="custom-cal-100" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Kcal/100g">
                            <label for="custom-cal-100" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Kcal/100g</label>
                        </div>
                        <div class="relative w-1/2">
                            <input type="number" id="custom-prot-100" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-blue-500 placeholder-transparent" placeholder="Protein/100g">
                            <label for="custom-prot-100" class="absolute left-3 top-1 text-[10px] text-blue-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-blue-400 pointer-events-none">Protein/100g</label>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <div class="relative w-1/2">
                            <input type="number" id="custom-cal-unit" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Kcal/unit (optional)">
                            <label for="custom-cal-unit" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Kcal/unit (optional)</label>
                        </div>
                        <div class="relative w-1/2">
                            <input type="number" id="custom-prot-unit" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-blue-500 placeholder-transparent" placeholder="Protein/unit (optional)">
                            <label for="custom-prot-unit" class="absolute left-3 top-1 text-[10px] text-blue-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-blue-400 pointer-events-none">Protein/unit (optional)</label>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button id="custom-mode-grams" onclick="setCustomMode('grams')" class="flex-1 bg-emerald-600 text-white py-1.5 rounded-lg font-bold text-sm transition">By Weight (g)</button>
                        <button id="custom-mode-units" onclick="setCustomMode('units')" class="flex-1 bg-gray-700 text-gray-300 py-1.5 rounded-lg font-bold text-sm transition">By Unit</button>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <div class="relative flex-1">
                            <input type="number" id="custom-amount" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Amount">
                            <label id="custom-amount-label" for="custom-amount" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Grams</label>
                        </div>
                    </div>
                    <button onclick="addCustom()" class="w-full bg-emerald-600 py-3 rounded-lg font-bold hover:bg-emerald-500 text-lg transition shadow-lg mt-4">Add to Plate</button>
                </div>
            </div>
        </div>

        <div id="screen-new" class="hidden space-y-4">
            <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
                <div class="space-y-4 mt-2">
                    <select id="new-category" class="w-full bg-gray-900 text-white px-3 py-3 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 mb-2 font-bold">
                        <option value="Meals">Meal</option>
                        <option value="Vegetables">Vegetable</option>
                        <option value="Ingredients">Ingredient</option>
                        <option value="Snacks">Snack</option>
                        <option value="Drinks">Drink</option>
                    </select>
    
                    <div class="flex gap-2">
                        <div class="relative w-1/3">
                            <input type="text" id="new-brand" onfocus="showBrandDropdown('new')" oninput="filterBrands('new')" autocomplete="off" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Brand">
                            <label for="new-brand" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Brand</label>
                            <div id="new-brand-dropdown" class="hidden absolute top-full left-0 min-w-[150px] mt-1 bg-gray-800 border border-gray-600 rounded-lg shadow-2xl z-50 max-h-48 overflow-y-auto"></div>
                        </div>
                        <div class="relative w-2/3">
                            <input type="text" id="new-name" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Official Name">
                            <label for="new-name" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Official Name</label>
                        </div>
                    </div>
                    <div class="relative w-full">
                        <input type="text" id="new-note" class="peer w-full bg-gray-900 text-emerald-400 px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Note (optional)">
                        <label for="new-note" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Note (optional)</label>
                    </div>
                    <div class="flex gap-2">
                        <div class="relative w-1/2">
                            <input type="number" id="new-cal" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-emerald-900 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Kcal/100g">
                            <label for="new-cal" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Kcal/100g</label>
                        </div>
                        <div class="relative w-1/2">
                            <input type="number" id="new-prot" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-blue-900 focus:outline-none focus:border-blue-500 placeholder-transparent" placeholder="Prot/100g">
                            <label for="new-prot" class="absolute left-3 top-1 text-[10px] text-blue-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-blue-400 pointer-events-none">Prot/100g</label>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <div class="relative w-1/3">
                            <input type="number" id="new-cal-unit" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-emerald-900 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Kcal/unit">
                            <label for="new-cal-unit" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Kcal/unit</label>
                        </div>
                        <div class="relative w-1/3">
                            <input type="number" id="new-prot-unit" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-blue-900 focus:outline-none focus:border-blue-500 placeholder-transparent" placeholder="Prot/unit">
                            <label for="new-prot-unit" class="absolute left-3 top-1 text-[10px] text-blue-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-blue-400 pointer-events-none">Prot/unit</label>
                        </div>
                        <div class="relative w-1/3">
                            <input type="number" id="new-weight-unit" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-purple-900 focus:outline-none focus:border-purple-500 placeholder-transparent" placeholder="Weight (g)">
                            <label for="new-weight-unit" class="absolute left-3 top-1 text-[10px] text-purple-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-purple-400 pointer-events-none">Weight (g)</label>
                        </div>
                    </div>
                    <button onclick="addToDb()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 text-lg transition shadow-lg mt-4">Save & Return</button>
                </div>
            </div>
        </div>

        <div id="screen-settings" class="hidden space-y-4">
            <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
                <div class="space-y-4 mt-2">
                    <div>
                        <p class="text-xs text-gray-400 mb-1.5">Color Theme</p>
                        <div class="flex gap-2 flex-wrap">
                            <button id="theme-btn-dark" onclick="applyTheme('dark')" class="flex-1 bg-gray-900 border border-gray-700 py-3 rounded-lg text-xs font-bold text-gray-300 transition">🌑 Dark</button>
                            <button id="theme-btn-light" onclick="applyTheme('light')" class="flex-1 bg-white border border-gray-300 py-3 rounded-lg text-xs font-bold text-gray-700 transition">☀️ Light</button>
                            <button id="theme-btn-pink" onclick="applyTheme('pink')" class="flex-1 bg-pink-300 border border-pink-400 py-3 rounded-lg text-xs font-bold text-pink-900 transition">🌸 Pink</button>
                            <button id="theme-btn-red" onclick="applyTheme('red')" class="flex-1 bg-[#280a12] border border-[#5a1a2e] py-3 rounded-lg text-xs font-bold text-[#f5c6d0] transition">🍷 Red</button>
                        </div>
                    </div>
                    <div class="relative w-full">
                        <input type="password" id="gh-token" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent text-sm" placeholder="GitHub PAT Token">
                        <label for="gh-token" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">GitHub PAT Token</label>
                    </div>
                    <div class="relative w-full">
                        <input type="text" id="gh-gist" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent text-sm" placeholder="Gist ID">
                        <label for="gh-gist" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Gist ID</label>
                    </div>
                    <button onclick="saveSettings()" class="w-full bg-gray-700 py-3 rounded-lg font-bold hover:bg-gray-600 transition mt-2">Save Credentials</button>
                </div>
            </div>
        </div>

    </div>

    <nav class="fixed bottom-0 w-full bg-gray-900 border-t border-gray-800 pb-[env(safe-area-inset-bottom)] z-40">
        <div class="flex justify-around items-center max-w-md mx-auto h-16">
            <button onclick="switchTab('home')" id="tab-home" class="nav-btn flex-1 flex flex-col items-center justify-center text-emerald-400 transition-colors">
                <span class="text-xl mb-1">🍽️</span>
                <span class="text-[10px] font-bold">Meal</span>
            </button>
            <button onclick="switchTab('custom')" id="tab-custom" class="nav-btn flex-1 flex flex-col items-center justify-center text-gray-500 hover:text-gray-400 transition-colors">
                <span class="text-xl mb-1">⚖️</span>
                <span class="text-[10px] font-bold">Custom</span>
            </button>
            <button onclick="switchTab('new')" id="tab-new" class="nav-btn flex-1 flex flex-col items-center justify-center text-gray-500 hover:text-gray-400 transition-colors">
                <span class="text-xl mb-1">➕</span>
                <span class="text-[10px] font-bold">New Food</span>
            </button>
            <button onclick="switchTab('settings')" id="tab-settings" class="nav-btn flex-1 flex flex-col items-center justify-center text-gray-500 hover:text-gray-400 transition-colors">
                <span class="text-xl mb-1">⚙️</span>
                <span class="text-[10px] font-bold">Settings</span>
            </button>
        </div>
    </nav>

    <!-- Weight Entry Modal -->
    <div id="weight-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-gray-800 rounded-xl p-6 w-full max-w-xs border border-gray-700 shadow-2xl transform transition-all">
            <h3 id="weight-modal-title" class="text-xl font-bold text-emerald-400 mb-3 text-center">Enter Weight</h3>
            <div id="weight-mode-toggle" class="hidden flex gap-2 mb-3">
                <button id="mode-btn-grams" onclick="setWeightMode('grams')" class="flex-1 bg-emerald-600 py-2 rounded-lg font-bold text-sm transition">By Weight (g)</button>
                <button id="mode-btn-units" onclick="setWeightMode('units')" class="flex-1 bg-gray-700 py-2 rounded-lg font-bold text-sm transition">By Unit</button>
            </div>
            <div class="relative w-full mb-6">
                <input type="number" id="weight-input" inputmode="decimal" class="peer w-full bg-gray-900 text-white text-3xl px-4 pt-7 pb-2 rounded-lg border border-gray-700 focus:border-emerald-500 focus:outline-none text-center font-bold placeholder-transparent" placeholder="Amount">
                <label id="weight-input-label" for="weight-input" class="absolute left-1/2 -translate-x-1/2 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-lg peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-4 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Grams</label>
            </div>
            <div class="flex gap-3">
                <button onclick="closeWeightModal()" class="flex-1 bg-gray-700 py-3 rounded-lg font-bold hover:bg-gray-600 transition text-gray-300">Cancel</button>
                <button onclick="confirmWeight()" class="flex-1 bg-emerald-600 py-3 rounded-lg font-bold hover:bg-emerald-500 transition text-white">Add to Plate</button>
            </div>
        </div>
    </div>

    <!-- Edit Food Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-gray-800 rounded-xl p-6 w-full max-w-xs border border-gray-700 shadow-2xl">
            <h3 class="text-xl font-bold text-emerald-400 mb-4 text-center">Edit Food</h3>
            <div class="space-y-2">
                <select id="edit-category" class="w-full bg-gray-900 text-white px-3 py-2 rounded-lg border border-gray-700 focus:outline-none font-bold">
                    <option value="Meals">Meal</option>
                    <option value="Vegetables">Vegetable</option>
                    <option value="Ingredients">Ingredient</option>
                    <option value="Snacks">Snack</option>
                    <option value="Drinks">Drink</option>
                </select>
                <div class="flex gap-2">
                    <div class="relative w-1/3">
                        <input type="text" id="edit-brand" onfocus="showBrandDropdown('edit')" oninput="filterBrands('edit')" autocomplete="off" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Brand">
                        <label for="edit-brand" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Brand</label>
                        <div id="edit-brand-dropdown" class="hidden absolute top-full left-0 min-w-[150px] mt-1 bg-gray-800 border border-gray-600 rounded-lg shadow-2xl z-50 max-h-48 overflow-y-auto"></div>
                    </div>
                    <div class="relative w-2/3">
                        <input type="text" id="edit-name" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Official Name">
                        <label for="edit-name" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Official Name</label>
                    </div>
                </div>
                <div class="relative w-full">
                    <input type="text" id="edit-note" class="peer w-full bg-gray-900 text-emerald-400 px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Note (optional)">
                        <label for="edit-note" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Note (optional)</label>
                </div>
                <div class="flex gap-2">
                    <div class="relative w-1/2">
                        <input type="number" id="edit-cal" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Kcal/100g">
                        <label for="edit-cal" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Kcal/100g</label>
                    </div>
                    <div class="relative w-1/2">
                        <input type="number" id="edit-prot" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-blue-500 placeholder-transparent" placeholder="Prot/100g">
                        <label for="edit-prot" class="absolute left-3 top-1 text-[10px] text-blue-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-blue-400 pointer-events-none">Prot/100g</label>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="relative w-1/3">
                        <input type="number" id="edit-cal-unit" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Kcal/unit">
                        <label for="edit-cal-unit" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Kcal/unit</label>
                    </div>
                    <div class="relative w-1/3">
                        <input type="number" id="edit-prot-unit" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-blue-500 placeholder-transparent" placeholder="Prot/unit">
                        <label for="edit-prot-unit" class="absolute left-3 top-1 text-[10px] text-blue-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-blue-400 pointer-events-none">Prot/unit</label>
                    </div>
                    <div class="relative w-1/3">
                        <input type="number" id="edit-weight-unit" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-purple-900 focus:outline-none focus:border-purple-500 placeholder-transparent" placeholder="Weight (g)">
                        <label for="edit-weight-unit" class="absolute left-3 top-1 text-[10px] text-purple-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-purple-400 pointer-events-none">Weight (g)</label>
                    </div>
                </div>
            </div>
            <div class="flex gap-3 mt-4">
                <button onclick="closeEditModal()" class="flex-1 bg-gray-700 py-3 rounded-lg font-bold hover:bg-gray-600 transition text-gray-300">Cancel</button>
                <button onclick="saveEdit()" class="flex-1 bg-emerald-600 py-3 rounded-lg font-bold hover:bg-emerald-500 transition">Save</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let db = JSON.parse(localStorage.getItem('foodDb')) || [];
        let plate = JSON.parse(localStorage.getItem('foodPlate')) || [];
        let ghToken = localStorage.getItem('ghToken') || '';
        let ghGistId = localStorage.getItem('ghGistId') || '';
        let currentWeightDbId = null;
        let activeCategoryFilter = 'All'; // New State for Category Tracking
        let currentWeightMode = 'grams'; // 'grams' or 'units'
        let currentEditId = null;
        let customMode = 'grams';
        let currentTheme = localStorage.getItem('appTheme') || 'dark';

        // Category Tab Switcher
        function setCategoryFilter(cat) {
            activeCategoryFilter = cat;
            
            // Visually update the pill buttons
            document.querySelectorAll('.cat-pill').forEach(btn => {
                if (btn.dataset.cat === cat) {
                    btn.classList.remove('bg-gray-700', 'text-gray-300');
                    btn.classList.add('bg-emerald-600', 'text-white');
                } else {
                    btn.classList.remove('bg-emerald-600', 'text-white');
                    btn.classList.add('bg-gray-700', 'text-gray-300');
                }
            });
            renderDb();
        }

        // Keyboard "Enter" listener for Modal
        document.getElementById('weight-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') confirmWeight();
        });

        // Copy to Clipboard feature
        async function copyCalories() {
            const calText = document.getElementById('total-cal').innerText;
            if (calText === "0") return;
            try {
                await navigator.clipboard.writeText(calText);
                const calDiv = document.getElementById('total-cal');
                calDiv.classList.remove('text-emerald-400');
                calDiv.classList.add('text-white', 'bg-emerald-500', 'rounded', 'px-2');
                setTimeout(() => {
                    calDiv.classList.remove('text-white', 'bg-emerald-500', 'rounded', 'px-2');
                    calDiv.classList.add('text-emerald-400');
                }, 400);
            } catch (err) {
                console.error('Failed to copy', err);
            }
        }

        // GitHub Sync Logic
        async function syncWithGitHub(isPushing = false) {
            if (!ghToken || !ghGistId) return;
            const syncBtn = document.getElementById('sync-status');
            syncBtn.innerText = "Syncing...";

            try {
                const response = await fetch(`https://api.github.com/gists/${ghGistId}`, {
                    headers: { 'Authorization': `token ${ghToken}` }
                });
                const gist = await response.json();
                const remoteDbStr = gist.files['foodDb.json']?.content;
                const remoteDb = remoteDbStr ? JSON.parse(remoteDbStr) : [];

                const mergedMap = new Map();
                [...remoteDb, ...db].forEach(item => {
                    if (!item.lastUsed) item.lastUsed = 0;
                    if (mergedMap.has(item.id)) {
                        const existing = mergedMap.get(item.id);
                        if (item.lastUsed > existing.lastUsed) mergedMap.set(item.id, item);
                    } else {
                        mergedMap.set(item.id, item);
                    }
                });
                db = Array.from(mergedMap.values());
                localStorage.setItem('foodDb', JSON.stringify(db));

                if (isPushing || JSON.stringify(remoteDb) !== JSON.stringify(db)) {
                    await fetch(`https://api.github.com/gists/${ghGistId}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `token ${ghToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            files: { 'foodDb.json': { content: JSON.stringify(db, null, 2) } }
                        })
                    });
                }
                renderDb();
                syncBtn.innerText = "✓ Synced";
                setTimeout(() => syncBtn.innerText = "Sync", 2000);
            } catch (error) {
                syncBtn.innerText = "✕ Error";
                setTimeout(() => syncBtn.innerText = "Sync", 2000);
            }
        }

        function saveSettings() {
            ghToken = document.getElementById('gh-token').value;
            ghGistId = document.getElementById('gh-gist').value;
            localStorage.setItem('ghToken', ghToken);
            localStorage.setItem('ghGistId', ghGistId);
            syncWithGitHub();
            switchTab('home');
        }

        function saveState() {
            localStorage.setItem('foodPlate', JSON.stringify(plate));
            localStorage.setItem('foodDb', JSON.stringify(db));
            renderAll();
        }

        // ADD NEW FOOD (Updated with Category)
        function addToDb() {
            const category = document.getElementById('new-category').value;
            const brand = document.getElementById('new-brand').value.trim();
            const name = document.getElementById('new-name').value.trim();
            const note = document.getElementById('new-note').value.trim();
            const cal = parseFloat(document.getElementById('new-cal').value);
            const prot = parseFloat(document.getElementById('new-prot').value) || 0;

            if (!name || isNaN(cal)) return alert("Official Name and Calories are required.");

            const calUnit = parseFloat(document.getElementById('new-cal-unit').value) || null;
            const protUnit = parseFloat(document.getElementById('new-prot-unit').value) || null;
            const weightUnit = parseFloat(document.getElementById('new-weight-unit').value);
            
            db.push({
                id: Date.now(),
                category: category,
                brand: brand,
                name: name,
                note: note,
                calPer100: cal || null,
                protPer100: prot || null,
                calPerUnit: calUnit,
                protPerUnit: protUnit,
                unitWeight: !isNaN(weightUnit) ? weightUnit : null,
                lastUsed: Date.now()
            });
            
            document.getElementById('new-brand').value = '';
            document.getElementById('new-name').value = '';
            document.getElementById('new-note').value = '';
            document.getElementById('new-cal').value = '';
            document.getElementById('new-prot').value = '';
            document.getElementById('new-cal-unit').value = '';
            document.getElementById('new-prot-unit').value = '';
            document.getElementById('new-weight-unit').value = '';
            
            saveState();
            
            // Automatically switch to the category tab where they just created the food
            if (activeCategoryFilter !== 'All' && activeCategoryFilter !== category) {
                setCategoryFilter(category);
            }

            if(ghToken) syncWithGitHub(true);
            switchTab('home');
        }

        async function deleteFromDb(dbId) {
            if(confirm("Delete this food from database?")) {
                db = db.filter(item => item.id !== dbId);
                saveState();

                if(ghToken && ghGistId) {
                    const syncBtn = document.getElementById('sync-status');
                    syncBtn.innerText = "Deleting...";
                    try {
                        const response = await fetch(`https://api.github.com/gists/${ghGistId}`, {
                            headers: { 'Authorization': `token ${ghToken}` }
                        });
                        const gist = await response.json();
                        let remoteDbStr = gist.files['foodDb.json']?.content;
                        let remoteDb = remoteDbStr ? JSON.parse(remoteDbStr) : [];
                        remoteDb = remoteDb.filter(item => item.id !== dbId);
                        await fetch(`https://api.github.com/gists/${ghGistId}`, {
                            method: 'PATCH',
                            headers: {
                                'Authorization': `token ${ghToken}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                files: { 'foodDb.json': { content: JSON.stringify(remoteDb, null, 2) } }
                            })
                        });
                        syncBtn.innerText = "✓ Deleted";
                        setTimeout(() => syncBtn.innerText = "Sync", 2000);
                    } catch (error) {
                        syncBtn.innerText = "✕ Error";
                        setTimeout(() => syncBtn.innerText = "Sync", 2000);
                    }
                }
            }
        }

        function triggerAddWeight(dbId) {
            currentWeightDbId = dbId;
            const food = db.find(f => f.id === dbId);
            const primaryName = food.name;
        
            const hasGrams = food.calPer100 != null && !isNaN(food.calPer100);
            const hasUnits = food.calPerUnit != null && !isNaN(food.calPerUnit);
        
            if (!hasGrams && hasUnits) currentWeightMode = 'units';
            else currentWeightMode = 'grams';
        
            const toggle = document.getElementById('weight-mode-toggle');
            if (hasGrams && hasUnits) toggle.classList.remove('hidden');
            else toggle.classList.add('hidden');
        
            updateWeightModalMode();
        
            document.getElementById('weight-modal-title').innerText = primaryName;
            document.getElementById('weight-input').value = '';
            document.getElementById('weight-modal').classList.remove('hidden');
            document.getElementById('weight-input').focus();
        }

        function setWeightMode(mode) {
            currentWeightMode = mode;
            updateWeightModalMode();
            document.getElementById('weight-input').value = '';
            document.getElementById('weight-input').focus();
        }
        
        function updateWeightModalMode() {
            const input = document.getElementById('weight-input');
            const label = document.getElementById('weight-input-label');
            const gramsBtn = document.getElementById('mode-btn-grams');
            const unitsBtn = document.getElementById('mode-btn-units');
        
            if (currentWeightMode === 'grams') {
                input.placeholder = 'Grams';
                if(label) label.innerText = 'Grams';
                input.inputMode = 'numeric';
                gramsBtn.classList.add('bg-emerald-600'); gramsBtn.classList.remove('bg-gray-700');
                unitsBtn.classList.add('bg-gray-700'); unitsBtn.classList.remove('bg-emerald-600');
            } else {
                input.placeholder = 'Units (e.g. 0.5, 1, 2)';
                if(label) label.innerText = 'Units';
                input.inputMode = 'decimal';
                unitsBtn.classList.add('bg-emerald-600'); unitsBtn.classList.remove('bg-gray-700');
                gramsBtn.classList.add('bg-gray-700'); gramsBtn.classList.remove('bg-emerald-600');
            }
        }

        function closeWeightModal() {
            document.getElementById('weight-modal').classList.add('hidden');
            document.getElementById('weight-input').blur();
            currentWeightDbId = null;
        }

        function confirmWeight() {
            if (!currentWeightDbId) return;
            const amount = parseFloat(document.getElementById('weight-input').value);
            if (!amount || isNaN(amount)) {
                alert("Please enter a valid amount.");
                document.getElementById('weight-input').focus();
                return;
            }
        
            const foodIndex = db.findIndex(f => f.id === currentWeightDbId);
            if (foodIndex === -1) return;
        
            const food = db[foodIndex];
            food.lastUsed = Date.now();
            db[foodIndex] = food;
        
            let totalCal, totalProt, entryLabel;
        
            if (currentWeightMode === 'grams') {
                totalCal = (food.calPer100 / 100) * amount;
                totalProt = ((food.protPer100 || 0) / 100) * amount;
                entryLabel = `${amount}g`;
            } else {
                totalCal = food.calPerUnit * amount;
                totalProt = (food.protPerUnit || 0) * amount;
                entryLabel = amount === 1 ? '1 unit' : `${amount} units`;
            }
        
            const displayName = food.brand ? `${food.brand} ${food.name}` : food.name;
            plate.push({
                id: Date.now(),
                name: `${displayName} (${entryLabel})`,
                totalCal: totalCal,
                totalProt: totalProt
            });
        
            closeWeightModal();
            saveState();
            if (ghToken) syncWithGitHub(true);
        }


        function setCustomMode(mode) {
            customMode = mode;
            const gramsBtn = document.getElementById('custom-mode-grams');
            const unitsBtn = document.getElementById('custom-mode-units');
            const amountInput = document.getElementById('custom-amount');
            const amountLabel = document.getElementById('custom-amount-label');
            if (mode === 'grams') {
                amountInput.placeholder = 'Grams';
                if(amountLabel) amountLabel.innerText = 'Grams';
                gramsBtn.classList.add('bg-emerald-600', 'text-white'); gramsBtn.classList.remove('bg-gray-700', 'text-gray-300');
                unitsBtn.classList.add('bg-gray-700', 'text-gray-300'); unitsBtn.classList.remove('bg-emerald-600', 'text-white');
            } else {
                amountInput.placeholder = 'Units (e.g. 0.5, 1, 2)';
                if(amountLabel) amountLabel.innerText = 'Units';
                unitsBtn.classList.add('bg-emerald-600', 'text-white'); unitsBtn.classList.remove('bg-gray-700', 'text-gray-300');
                gramsBtn.classList.add('bg-gray-700', 'text-gray-300'); gramsBtn.classList.remove('bg-emerald-600', 'text-white');
            }
        }
        
        function addCustom() {
            const amount = parseFloat(document.getElementById('custom-amount').value);
            if (!amount || isNaN(amount)) return alert("Please enter an amount.");
        
            let totalCal, totalProt, entryLabel;
        
            if (customMode === 'grams') {
                const cal100 = parseFloat(document.getElementById('custom-cal-100').value);
                const prot100 = parseFloat(document.getElementById('custom-prot-100').value) || 0;
                if (isNaN(cal100)) return alert("Please enter Kcal/100g.");
                totalCal = (cal100 / 100) * amount;
                totalProt = (prot100 / 100) * amount;
                entryLabel = `${amount}g`;
            } else {
                const calUnit = parseFloat(document.getElementById('custom-cal-unit').value);
                const protUnit = parseFloat(document.getElementById('custom-prot-unit').value) || 0;
                if (isNaN(calUnit)) return alert("Please enter Kcal/unit.");
                totalCal = calUnit * amount;
                totalProt = protUnit * amount;
                entryLabel = amount === 1 ? '1 unit' : `${amount} units`;
            }
        
            plate.push({ id: Date.now(), name: `Custom Entry (${entryLabel})`, totalCal, totalProt });
        
            document.getElementById('custom-cal-100').value = '';
            document.getElementById('custom-prot-100').value = '';
            document.getElementById('custom-cal-unit').value = '';
            document.getElementById('custom-prot-unit').value = '';
            document.getElementById('custom-amount').value = '';
        
            saveState();
            switchTab('home');
        }


        function removeFromPlate(plateId) {
            plate = plate.filter(item => item.id !== plateId);
            saveState();
        }

        function clearPlate() {
            if(confirm("Clear current meal?")) {
                plate = [];
                saveState();
            }
        }

        function renderAll() {
            renderDb();
            renderPlate();
        }

        // RENDER DATABASE (Updated with Category Filtering)
        function renderDb() {
            const search = document.getElementById('search-db').value.toLowerCase();
            const sortOrder = document.getElementById('sort-order').value;
            const list = document.getElementById('db-list');
            list.innerHTML = '';

            let sortedDb = [...db];
            if (sortOrder === 'recent') {
                sortedDb.sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
            } else if (sortOrder === 'name') {
                sortedDb.sort((a, b) => {
                    const nameA = a.name.toLowerCase();
                    const nameB = b.name.toLowerCase();
                    return nameA.localeCompare(nameB);
                });
            } else if (sortOrder === 'brand') {
                sortedDb.sort((a, b) => {
                    const brandA = (a.brand || '').toLowerCase();
                    const brandB = (b.brand || '').toLowerCase();
                    return brandA.localeCompare(brandB) || a.name.localeCompare(b.name);
                });
            }

            const filtered = sortedDb.filter(f => {
                const itemCat = f.category || 'Ingredients';
                if (activeCategoryFilter !== 'All' && itemCat !== activeCategoryFilter) return false;
                const searchStr = `${f.brand || ''} ${f.name} ${f.note || f.customName || ''}`.toLowerCase();
                return searchStr.includes(search);
            });

            filtered.forEach(food => {
                let primaryName = food.name;
                
                let secondaryParts = [];
                if (food.brand) secondaryParts.push(food.brand);
                let itemNote = food.note || food.customName;
                if (itemNote) secondaryParts.push(`Note: ${itemNote}`);
                let secondaryName = secondaryParts.join(' <span class="text-gray-600">|</span> ');

                const itemCat = food.category || 'Ingredients';
                
                const badgeHtml = `<span class="text-[8px] uppercase tracking-wider border border-gray-600 text-gray-400 px-1 leading-tight rounded">${itemCat}</span>`;

                let unitLabel = '(unit)';
                if (food.unitWeight != null && !isNaN(food.unitWeight)) {
                    unitLabel = `(unit: ${food.unitWeight}g)`;
                }

                list.innerHTML += `
                    <div id="item-${food.id}" class="bg-gray-900 rounded-lg border border-gray-700">
                        <div class="flex justify-between items-stretch p-3">
                            <div class="flex-1 cursor-pointer" onclick="triggerAddWeight(${food.id})">
                                <div class="font-bold text-emerald-400 text-lg">
                                    ${primaryName}
                                </div>
                                ${secondaryName ? `<div class="text-xs text-gray-400 mb-1 mt-0.5">${secondaryName}</div>` : ''}
                                <div class="text-xs text-gray-500 font-mono">
                                    ${food.calPer100 != null ? `<div>${food.calPer100} kcal | ${food.protPer100 || 0}g prot <span class="text-gray-700">(100g)</span></div>` : ''}
                                    ${food.calPerUnit != null ? `<div>${food.calPerUnit} kcal | ${food.protPerUnit || 0}g prot <span class="text-gray-700">${unitLabel}</span></div>` : ''}
                                </div>
                            </div>
                            <div class="flex flex-col items-end justify-between ml-2">
                                ${badgeHtml}
                                <button onclick="toggleItemMenu(${food.id})" class="text-gray-500 hover:text-white text-sm transition">⚙</button>
                            </div>
                        </div>
                        <div id="menu-${food.id}" class="hidden border-t border-gray-700 flex gap-2 p-2">
                            <button onclick="editFood(${food.id})" class="flex-1 bg-blue-600/20 text-blue-400 py-2 rounded-lg text-sm font-bold hover:bg-blue-600/40 transition">✏ Edit</button>
                            <button onclick="deleteFromDb(${food.id})" class="flex-1 bg-red-600/20 text-red-400 py-2 rounded-lg text-sm font-bold hover:bg-red-600/40 transition">✕ Delete</button>
                            <button onclick="toggleItemMenu(${food.id})" class="flex-1 bg-gray-700 text-gray-300 py-2 rounded-lg text-sm font-bold hover:bg-gray-600 transition">Cancel</button>
                        </div>
                    </div>
                `;
            });
        }

        function renderPlate() {
            const list = document.getElementById('plate-list');
            let sumCal = 0; let sumProt = 0;
            list.innerHTML = '';

            plate.forEach(item => {
                sumCal += item.totalCal; sumProt += item.totalProt;
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-800 p-3 rounded-lg border border-gray-600 shadow-sm">
                        <div>
                            <div class="font-bold text-gray-200">${item.name}</div>
                            <div class="text-sm text-emerald-500 font-mono">${item.totalCal.toFixed(0)} kcal | <span class="text-blue-400">${item.totalProt.toFixed(1)}g prot</span></div>
                        </div>
                        <button onclick="removeFromPlate(${item.id})" class="bg-red-900/50 text-red-400 w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-800/80 transition">✕</button>
                    </div>
                `;
            });

            document.getElementById('total-cal').innerText = sumCal.toFixed(0);
            document.getElementById('total-prot').innerText = sumProt.toFixed(1);
        }

        function toggleBlock(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        function toggleItemMenu(id) {
            const menu = document.getElementById(`menu-${id}`);
            document.querySelectorAll('[id^="menu-"]').forEach(m => {
                if (m.id !== `menu-${id}`) m.classList.add('hidden');
            });
            menu.classList.toggle('hidden');
        }
        
        function editFood(id) {
            currentEditId = id;
            const food = db.find(f => f.id === id);
            if (!food) return;
            document.getElementById('edit-category').value = food.category || 'Ingredients';
            document.getElementById('edit-brand').value = food.brand || '';
            document.getElementById('edit-name').value = food.name || '';
            document.getElementById('edit-note').value = food.note || food.customName || '';
            document.getElementById('edit-cal').value = food.calPer100 != null ? food.calPer100 : '';
            document.getElementById('edit-prot').value = food.protPer100 != null ? food.protPer100 : '';
            document.getElementById('edit-cal-unit').value = food.calPerUnit != null ? food.calPerUnit : '';
            document.getElementById('edit-prot-unit').value = food.protPerUnit != null ? food.protPerUnit : '';
            document.getElementById('edit-weight-unit').value = food.unitWeight != null ? food.unitWeight : '';
            document.getElementById('edit-modal').classList.remove('hidden');
        }
        
        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            currentEditId = null;
        }
        
        function saveEdit() {
            if (!currentEditId) return;
            const idx = db.findIndex(f => f.id === currentEditId);
            if (idx === -1) return;
            const name = document.getElementById('edit-name').value.trim();
            if (!name) return alert("Official Name is required.");
            const cal = parseFloat(document.getElementById('edit-cal').value);
            const prot = parseFloat(document.getElementById('edit-prot').value);
            const calUnit = parseFloat(document.getElementById('edit-cal-unit').value);
            const protUnit = parseFloat(document.getElementById('edit-prot-unit').value);
            const weightUnit = parseFloat(document.getElementById('edit-weight-unit').value);
            db[idx] = {
                ...db[idx],
                category: document.getElementById('edit-category').value,
                brand: document.getElementById('edit-brand').value.trim(),
                name: name,
                note: document.getElementById('edit-note').value.trim(),
                calPer100: !isNaN(cal) ? cal : null,
                protPer100: !isNaN(prot) ? prot : null,
                calPerUnit: !isNaN(calUnit) ? calUnit : null,
                protPerUnit: !isNaN(protUnit) ? protUnit : null,
                unitWeight: !isNaN(weightUnit) ? weightUnit : null,
                lastUsed: Date.now(),
            };
            closeEditModal();
            saveState();
            if (ghToken) syncWithGitHub(true);
        }

        function applyTheme(theme) {
            currentTheme = theme;
            localStorage.setItem('appTheme', theme);
            document.body.setAttribute('data-theme', theme);
            ['dark', 'light', 'pink', 'red'].forEach(t => {
                const btn = document.getElementById(`theme-btn-${t}`);
                if (!btn) return;
                btn.classList.toggle('ring-2', t === theme);
                btn.classList.toggle('ring-emerald-400', t === theme);
                btn.classList.toggle('ring-offset-1', t === theme);
            });
        }

        // --- SCROLL TO TOP LOGIC ---
        window.addEventListener('scroll', function() {
            const btn = document.getElementById('scroll-top-btn');
            if (!btn) return;
            
            // Show the button only after scrolling down 350px
            if (window.scrollY > 350) {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        });

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // --- BRAND AUTOCOMPLETE LOGIC ---
        function getUniqueBrands() {
            // Harvest every brand currently in the database, remove blanks, and sort alphabetically
            const brands = db.map(item => item.brand).filter(b => b && b.trim() !== '');
            return [...new Set(brands)].sort((a, b) => a.localeCompare(b));
        }

        function showBrandDropdown(prefix) {
            const input = document.getElementById(`${prefix}-brand`);
            renderBrandDropdown(prefix, input.value);
        }

        function filterBrands(prefix) {
            const input = document.getElementById(`${prefix}-brand`);
            renderBrandDropdown(prefix, input.value);
        }

        function renderBrandDropdown(prefix, filterText) {
            const dropdown = document.getElementById(`${prefix}-brand-dropdown`);
            let brands = getUniqueBrands();
            
            // Filter by whatever the user has typed so far (case insensitive)
            if (filterText) {
                brands = brands.filter(b => b.toLowerCase().includes(filterText.toLowerCase()));
            }
            
            // If no brands match, hide the dropdown
            if (brands.length === 0) {
                dropdown.classList.add('hidden');
                return;
            }
            
            // Build the dropdown HTML (using onmousedown so it registers before the input loses focus)
            dropdown.innerHTML = brands.map(b => {
                const safeBrand = b.replace(/'/g, "\\'"); // Prevent errors with brands like "Kellogg's"
                return `<div class="px-3 py-2 text-sm text-gray-300 hover:bg-gray-700 hover:text-emerald-400 cursor-pointer transition border-b border-gray-700 last:border-0" onmousedown="selectBrand('${prefix}', '${safeBrand}')">${b}</div>`;
            }).join('');
            
            dropdown.classList.remove('hidden');
        }

        function selectBrand(prefix, brandName) {
            const input = document.getElementById(`${prefix}-brand`);
            const dropdown = document.getElementById(`${prefix}-brand-dropdown`);
            
            input.value = brandName;
            dropdown.classList.add('hidden');
            
            // Force the mobile keyboard to close immediately
            input.blur(); 
        }

        // Global listener: If you tap anywhere else on the screen, hide any open brand dropdowns
        document.addEventListener('mousedown', function(e) {
            const newBrandDropdown = document.getElementById('new-brand-dropdown');
            const editBrandDropdown = document.getElementById('edit-brand-dropdown');
            
            if (newBrandDropdown && !e.target.closest('#new-brand') && !e.target.closest('#new-brand-dropdown')) {
                newBrandDropdown.classList.add('hidden');
            }
            if (editBrandDropdown && !e.target.closest('#edit-brand') && !e.target.closest('#edit-brand-dropdown')) {
                editBrandDropdown.classList.add('hidden');
            }
        });

        // --- SPA NAVIGATION LOGIC ---
        function switchTab(tabId) {
            // Hide all screens
            ['home', 'custom', 'new', 'settings'].forEach(id => {
                document.getElementById(`screen-${id}`).classList.add('hidden');
                document.getElementById(`screen-${id}`).classList.remove('block');
                
                // Dim all nav buttons
                const btn = document.getElementById(`tab-${id}`);
                btn.classList.remove('text-emerald-400');
                btn.classList.add('text-gray-500');
            });

            // Show active screen
            document.getElementById(`screen-${tabId}`).classList.remove('hidden');
            document.getElementById(`screen-${tabId}`).classList.add('block');
            
            // Highlight active nav button
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.remove('text-gray-500');
            activeBtn.classList.add('text-emerald-400');

            // Dynamically update the Top App Bar Title
            const header = document.getElementById('app-header-title');
            const version = document.getElementById('app-version');
            
            if (tabId === 'home') {
                header.innerText = "CALculator";
                version.classList.remove('hidden');
            } else if (tabId === 'custom') {
                header.innerText = "Custom Entry";
                version.classList.add('hidden');
            } else if (tabId === 'new') {
                header.innerText = "Create Food";
                version.classList.add('hidden');
            } else if (tabId === 'settings') {
                header.innerText = "Settings";
                version.classList.add('hidden');
            }
            
            // Optional: If you open settings, auto-fill the tokens
            if (tabId === 'settings') {
                document.getElementById('gh-token').value = ghToken;
                document.getElementById('gh-gist').value = ghGistId;
            }
            
            // Snap back to top of screen
            window.scrollTo(0, 0);
        }

        // Init
        renderAll();
        applyTheme(currentTheme);
        if(ghToken && ghGistId) syncWithGitHub();
    </script>
</body>
</html>
