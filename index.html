<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CALculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-primary-400: 94 234 212; /* Mint */
            --color-primary-500: 45 212 191;
            --color-primary-600: 20 184 166;
            
            --color-secondary-400: 249 168 212; /* Pink */
            --color-secondary-500: 244 114 182;
            --color-secondary-600: 236 72 153;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            400: 'rgb(var(--color-primary-400) / <alpha-value>)',
                            500: 'rgb(var(--color-primary-500) / <alpha-value>)',
                            600: 'rgb(var(--color-primary-600) / <alpha-value>)',
                        },
                        blue: {
                            400: 'rgb(var(--color-secondary-400) / <alpha-value>)',
                            500: 'rgb(var(--color-secondary-500) / <alpha-value>)',
                            600: 'rgb(var(--color-secondary-600) / <alpha-value>)',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { 
            overscroll-behavior-y: contain; 
            overflow-y: scroll;
        }
        input[type="number"], input[type="text"], input[type="password"], input[type="email"], select { font-size: 1rem; }
        .hidden { display: none !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Light Theme ── */
        body[data-theme="light"] { background-color: #f3f4f6; }
        body[data-theme="light"] .bg-gray-900 { background-color: #f3f4f6 !important; }
        body[data-theme="light"] .bg-gray-800 { background-color: #ffffff !important; }
        body[data-theme="light"] .bg-gray-700 { background-color: #e5e7eb !important; }
        body[data-theme="light"] .hover\:bg-gray-600:hover { background-color: #d1d5db !important; }
        body[data-theme="light"] .text-white { color: #111827 !important; }
        body[data-theme="light"] .text-gray-200 { color: #1f2937 !important; }
        body[data-theme="light"] .text-gray-300 { color: #374151 !important; }
        body[data-theme="light"] .text-gray-400 { color: #6b7280 !important; }
        body[data-theme="light"] .text-gray-500 { color: #9ca3af !important; }
        body[data-theme="light"] .text-gray-600 { color: #b0b9c5 !important; }
        body[data-theme="light"] .text-gray-700 { color: #d1d5db !important; }
        body[data-theme="light"] .border-gray-700 { border-color: #e5e7eb !important; }
        body[data-theme="light"] .border-gray-600 { border-color: #d1d5db !important; }
        
        /* ── Pink Theme ── */
        body[data-theme="pink"] { background-color: #fdf2f8; }
        body[data-theme="pink"] .bg-gray-900 { background-color: #fce7f3 !important; }
        body[data-theme="pink"] .bg-gray-800 { background-color: #fff0f7 !important; }
        body[data-theme="pink"] .bg-gray-700 { background-color: #fbcfe8 !important; }
        body[data-theme="pink"] .hover\:bg-gray-600:hover { background-color: #f9a8d4 !important; }
        body[data-theme="pink"] .text-white { color: #500724 !important; }
        body[data-theme="pink"] .text-gray-200 { color: #881337 !important; }
        body[data-theme="pink"] .text-gray-300 { color: #9d174d !important; }
        body[data-theme="pink"] .text-gray-400 { color: #be185d !important; }
        body[data-theme="pink"] .text-gray-500 { color: #db2777 !important; }
        body[data-theme="pink"] .text-gray-600 { color: #ec4899 !important; }
        body[data-theme="pink"] .text-gray-700 { color: #f9a8d4 !important; }
        body[data-theme="pink"] .border-gray-700 { border-color: #f9a8d4 !important; }
        body[data-theme="pink"] .border-gray-600 { border-color: #fbcfe8 !important; }
        
        /* ── Red Theme ── */
        body[data-theme="red"] { background-color: #150208; }
        body[data-theme="red"] .bg-gray-900 { background-color: #150208 !important; }
        body[data-theme="red"] .bg-gray-800 { background-color: #280a12 !important; }
        body[data-theme="red"] .bg-gray-700 { background-color: #3f1020 !important; }
        body[data-theme="red"] .hover\:bg-gray-600:hover { background-color: #5a1a2e !important; }
        body[data-theme="red"] .text-white { color: #fdf0f3 !important; }
        body[data-theme="red"] .text-gray-200 { color: #f5c6d0 !important; }
        body[data-theme="red"] .text-gray-300 { color: #e8a0b0 !important; }
        body[data-theme="red"] .text-gray-400 { color: #c97a8e !important; }
        body[data-theme="red"] .text-gray-500 { color: #a05268 !important; }
        body[data-theme="red"] .text-gray-600 { color: #7a3348 !important; }
        body[data-theme="red"] .text-gray-700 { color: #5a1a2e !important; }
        body[data-theme="red"] .border-gray-700 { border-color: #5a1a2e !important; }
        body[data-theme="red"] .border-gray-600 { border-color: #7a3348 !important; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">

    <div id="loading-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 transition-opacity duration-300">
        <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-[rgb(var(--color-primary-400))] to-[rgb(var(--color-secondary-400))] animate-pulse">CALculator</h1>
    </div>
    
    <div id="auth-container" class="max-w-md mx-auto p-6 min-h-screen flex flex-col justify-center hidden">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-[rgb(var(--color-primary-400))] to-[rgb(var(--color-secondary-400))] mb-2">CALculator</h1>
            <p class="text-gray-400 text-sm">Secure Household Login</p>
        </div>

        <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 shadow-2xl space-y-4">
            
            <div class="relative w-full">
                <input type="text" id="auth-name" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-[rgb(var(--color-primary-500))] placeholder-transparent" placeholder="Name">
                <label for="auth-name" class="absolute left-3 top-1 text-[10px] text-[rgb(var(--color-primary-400))] transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-[rgb(var(--color-primary-400))] pointer-events-none">Display Name (Sign Up Only)</label>
            </div>

            <div class="relative w-full">
                <input type="email" id="auth-email" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-[rgb(var(--color-primary-500))] placeholder-transparent" placeholder="Email">
                <label for="auth-email" class="absolute left-3 top-1 text-[10px] text-[rgb(var(--color-primary-400))] transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-[rgb(var(--color-primary-400))] pointer-events-none">Email Address</label>
            </div>
            
            <div class="relative w-full">
                <input type="password" id="auth-password" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-[rgb(var(--color-primary-500))] placeholder-transparent" placeholder="Password">
                <label for="auth-password" class="absolute left-3 top-1 text-[10px] text-[rgb(var(--color-primary-400))] transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-[rgb(var(--color-primary-400))] pointer-events-none">Password</label>
            </div>

            <div id="auth-error" class="hidden text-rose-400 text-xs font-bold text-center bg-rose-900/20 py-2 rounded"></div>

            <div class="pt-2 space-y-3">
                <button onclick="handleLogin()" class="w-full bg-[rgb(var(--color-primary-600))] hover:bg-[rgb(var(--color-primary-500))] text-white py-3 rounded-lg font-bold transition shadow-lg">Log In</button>
                <button onclick="handleSignUp()" class="w-full bg-gray-700 hover:bg-gray-600 text-gray-300 py-3 rounded-lg font-bold transition">Create Account</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden fixed inset-0 flex flex-col overflow-hidden h-[100dvh]">
        <div id="main-scroll" class="flex-1 overflow-y-auto touch-pan-y">
            <div class="max-w-md mx-auto p-4 pt-[calc(env(safe-area-inset-top)+1rem)] pb-36">
                
                <div class="text-center mb-6">
                    <div class="relative inline-block">
                        <h1 id="app-header-title" class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-blue-500 transition-all duration-200">CALculator</h1>
                        <span id="app-version" class="absolute bottom-0.5 -right-10 text-[10px] text-gray-500 font-bold tracking-wider">v3.2.5</span>
                    </div>
                </div>
                
                <div id="screen-home" class="space-y-6 block transition-opacity">
                    
                    <div class="bg-gray-800 rounded-xl p-6 shadow-lg border border-gray-700">
                        <div class="flex justify-between items-center mb-2 border-b border-gray-800 pb-2">
                            <div id="category-tabs" class="flex items-center gap-2 overflow-x-auto hide-scrollbar flex-1 pr-2">
                                </div>
                            
                            <button onclick="clearAllMeals()" class="flex-shrink-0 ml-2 text-[10px] font-bold bg-red-900/20 text-red-400 px-2.5 py-1.5 rounded-full border border-red-900/50 hover:bg-red-900/40 transition active:scale-95" title="Reset Entire Day">
                                🗑️ Reset
                            </button>
                        </div>

                        <div id="meal-tabs" class="flex items-center gap-2 mb-4 overflow-x-auto hide-scrollbar pb-1 min-h-[32px]">
                            </div>

                        <div class="flex justify-between items-center mb-2 h-8">
                            <h2 id="active-meal-title" class="text-xl font-bold text-gray-300">No Meal Selected</h2>
                            <div id="meal-actions" class="flex gap-1.5 hidden">
                                <button onclick="renameMeal()" class="text-xs bg-gray-700 text-gray-300 px-2 py-1 rounded hover:bg-gray-600 transition" title="Rename">✏️</button>
                                <button onclick="createNewMeal()" class="text-xs bg-emerald-900/40 text-emerald-400 px-2 py-1 rounded hover:bg-emerald-900/60 transition" title="New Empty Meal">➕</button>
                                <button onclick="duplicateMeal()" class="text-xs bg-blue-900/40 text-blue-400 px-2 py-1 rounded hover:bg-blue-900/60 transition" title="Duplicate">📋</button>
                                <button onclick="smartDeleteMeal()" class="text-xs bg-red-900/40 text-red-400 px-2 py-1 rounded hover:bg-red-900/60 transition" title="Delete or Clear">🗑️</button>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <div onclick="copyCalories()" class="flex-1 bg-gray-900 p-3 rounded-lg border border-gray-700 text-center cursor-pointer hover:bg-gray-800 transition active:scale-95 group">
                                <div class="text-sm text-gray-400 group-hover:text-gray-300 transition">Calories <span class="text-xs opacity-50">(tap)</span></div>
                                <div id="total-cal" class="text-2xl font-bold text-emerald-400 transition-colors duration-200">0</div>
                            </div>
                            <div class="flex-1 bg-gray-900 p-3 rounded-lg border border-gray-700 text-center">
                                <div class="text-sm text-gray-400">Protein (g)</div>
                                <div id="total-prot" class="text-2xl font-bold text-blue-400">0</div>
                            </div>
                        </div>
                    </div>
                    <div id="plate-list" class="space-y-2"></div>
                </div>

                <div id="screen-db" class="hidden space-y-4">
                    <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-gray-300">Food Database</h3>
                                <button onclick="fetchFoods()" id="sync-btn" class="text-sm bg-blue-600/20 text-blue-400 px-3 py-1 rounded-md hover:bg-blue-600/40 transition flex items-center gap-2">
                                    <span id="sync-status">Synced</span>
                                </button>
                            </div>
                        </div>
                        <div id="db-content">
                            <div class="flex flex-wrap gap-1.5 mb-4">
                                <button onclick="setCategoryFilter('All')" data-cat="All" class="cat-pill bg-emerald-600 text-white px-3 py-2 rounded-md text-xs font-bold transition">All</button>
                                <button onclick="setCategoryFilter('Meals')" data-cat="Meals" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Meals</button>
                                <button onclick="setCategoryFilter('Veggies & Fruit')" data-cat="Veggies & Fruit" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Veggies & Fruit</button>
                                <button onclick="setCategoryFilter('Carbs')" data-cat="Carbs" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Carbs</button>
                                <button onclick="setCategoryFilter('Bread')" data-cat="Bread" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Bread</button>
                                <button onclick="setCategoryFilter('Meat & Fish')" data-cat="Meat & Fish" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Meat & Fish</button>
                                <button onclick="setCategoryFilter('Dairy')" data-cat="Dairy" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Dairy</button>
                                <button onclick="setCategoryFilter('Ingredients')" data-cat="Ingredients" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Ingredients</button>
                                <button onclick="setCategoryFilter('Spreads')" data-cat="Spreads" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Spreads</button>
                                <button onclick="setCategoryFilter('Sauces')" data-cat="Sauces" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Sauces</button>
                                <button onclick="setCategoryFilter('Snacks')" data-cat="Snacks" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Snacks</button>
                                <button onclick="setCategoryFilter('Baking')" data-cat="Baking" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Baking</button>
                                <button onclick="setCategoryFilter('Drinks')" data-cat="Drinks" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Drinks</button>
                                <button onclick="setCategoryFilter('Supplements')" data-cat="Supplements" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Supplements</button>
                                <button onclick="setCategoryFilter('Mci')" data-cat="Mci" class="cat-pill bg-gray-700 text-gray-300 px-3 py-2 rounded-md text-xs font-bold transition hover:bg-gray-600">Mci</button>
                            </div>
                            <div class="flex gap-2 mb-4">
                                <div class="relative flex-1">
                                    <input type="text" id="search-db" oninput="handleSearch()" placeholder="Search brand, name..." class="w-full bg-gray-900 text-white pl-3 pr-8 py-2 rounded-lg border border-gray-700 focus:border-emerald-500 focus:outline-none">
                                    <button id="clear-search-btn" onclick="clearSearch()" class="hidden absolute right-2 top-1/2 -translate-y-1/2 w-6 h-6 flex items-center justify-center text-gray-500 hover:text-gray-300 transition-colors">✕</button>
                                </div>
                                <select id="sort-order" onchange="renderDb()" class="bg-gray-900 text-white px-2 py-2 rounded-lg border border-gray-700 focus:outline-none text-sm">
                                    <option value="recent">Recent</option>
                                    <option value="name">A-Z Name</option>
                                    <option value="brand">A-Z Brand</option>
                                </select>
                            </div>
                            <div id="db-list" class="space-y-2"></div> 
                        </div>
                    </div>
                    <button id="scroll-top-btn" onclick="scrollToTop()" class="hidden fixed bottom-[calc(env(safe-area-inset-bottom)+7rem)] right-4 bg-emerald-600 hover:bg-emerald-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-2xl z-30 transition-all duration-200 active:scale-95">
                        <span class="text-sm font-bold">▲</span>
                    </button>
                </div>
                
                <div id="screen-custom" class="hidden space-y-4">
                    <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
                        <div class="space-y-6 mt-2">
                            <div class="flex gap-2">
                                <div class="relative w-1/2">
                                    <input type="number" id="custom-cal-100" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Kcal/100g">
                                    <label for="custom-cal-100" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Kcal/100g</label>
                                </div>
                                <div class="relative w-1/2">
                                    <input type="number" id="custom-prot-100" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-blue-500 placeholder-transparent" placeholder="Protein/100g">
                                    <label for="custom-prot-100" class="absolute left-3 top-1 text-[10px] text-blue-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-blue-400 pointer-events-none">Protein/100g</label>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <div class="relative w-1/2">
                                    <input type="number" id="custom-cal-unit" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Kcal/unit (optional)">
                                    <label for="custom-cal-unit" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Kcal/unit (optional)</label>
                                </div>
                                <div class="relative w-1/2">
                                    <input type="number" id="custom-prot-unit" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-blue-500 placeholder-transparent" placeholder="Protein/unit (optional)">
                                    <label for="custom-prot-unit" class="absolute left-3 top-1 text-[10px] text-blue-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-blue-400 pointer-events-none">Protein/unit (optional)</label>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button id="custom-mode-grams" onclick="setCustomMode('grams')" class="flex-1 bg-emerald-600 text-white py-1.5 rounded-lg font-bold text-sm transition">By Weight (g)</button>
                                <button id="custom-mode-units" onclick="setCustomMode('units')" class="flex-1 bg-gray-700 text-gray-300 py-1.5 rounded-lg font-bold text-sm transition">By Unit</button>
                            </div>
                            <div class="flex gap-2 mt-4">
                                <div class="relative flex-1">
                                    <input type="number" id="custom-amount" inputmode="decimal" class="peer w-full bg-gray-900 text-white px-3 pt-5 pb-1 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 placeholder-transparent" placeholder="Amount">
                                    <label id="custom-amount-label" for="custom-amount" class="absolute left-3 top-1 text-[10px] text-emerald-400 transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-500 peer-placeholder-shown:top-2.5 peer-focus:top-1 peer-focus:text-[10px] peer-focus:text-emerald-400 pointer-events-none">Grams</label>
                                </div>
                            </div>
                            <button onclick="addCustom()" class="w-full bg-emerald-600 py-3 rounded-lg font-bold hover:bg-emerald-500 text-lg transition shadow-lg mt-4">Add to Plate</button>
                        </div>
                    </div>
                </div>
                
                <div id="screen-new" class="hidden space-y-4">
                    <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
                        <div class="space-y-4 mt-2">
                            <select id="new-category" class="w-full bg-gray-900 text-gray-400 px-3 py-3 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-500 mb-2 font-bold">
                                <option value="" disabled selected>Select a Category...</option>
                                <option value="Meals" class="text-white">Meals</option>
                                <option value="Veggies & Fruit" class="text-white">Veggies & Fruit</option>
                                <option value="Carbs" class="text-white">Carbs</option>
                                <option value="Bread" class="text-white">Bread</option>
                                <option value="Meat & Fish" class="text-white">Meat & Fish</option>
                                <option value="Dairy" class="text-white">Dairy</option>
                                <option value="Ingredients" class="text-white">Ingredients</option>
                                <option value="Spreads" class="text-white">Spreads</option>
                                <option value="Sauces" class="text-white">Sauces</option>
                                <option value="Snacks" class="text-white">Snacks</option>
                                <option value="Baking" class="text-white">Baking</option>
                                <option value="Drinks" class="text-white">Drinks</option>
                                <option value="Supplements" class="text-white">Supplements</option>
                                <option value="Mci" class="text-white">Mci</option>
                            </select>
                            
                            <div class="flex gap-2">

        function renderDb() {
            const search = document.getElementById('search-db').value.toLowerCase();
            const sortOrder = document.getElementById('sort-order').value;
            const list = document.getElementById('db-list');
            list.innerHTML = '';

            let sortedDb = [...db];
            if (sortOrder === 'recent') {
                sortedDb.sort((a, b) => b.created_at - a.created_at);
            } else if (sortOrder === 'name') {
                sortedDb.sort((a, b) => {
                    const nameA = a.name ? a.name.toLowerCase() : '';
                    const nameB = b.name ? b.name.toLowerCase() : '';
                    return nameA.localeCompare(nameB);
                });
            } else if (sortOrder === 'brand') {
                sortedDb.sort((a, b) => {
                    const brandA = (a.brand || '').toLowerCase();
                    const brandB = (b.brand || '').toLowerCase();
                    return brandA.localeCompare(brandB) || (a.name || '').localeCompare(b.name || '');
                });
            }

            const filtered = sortedDb.filter(f => {
                const itemCat = f.category || 'Ingredients';
                if (activeCategoryFilter !== 'All' && itemCat !== activeCategoryFilter) return false;
                const searchStr = `${f.brand || ''} ${f.name || ''} ${f.note || ''}`.toLowerCase();
                return searchStr.includes(search);
            });

            filtered.forEach(food => {
                let primaryName = food.name;
                let secondaryParts = [];
                if (food.brand) secondaryParts.push(food.brand);
                if (food.note) secondaryParts.push(`Note: ${food.note}`);
                let secondaryName = secondaryParts.join(' <span class="text-gray-600">|</span> ');

                const itemCat = food.category || 'Meals';
                const badgeHtml = `<span class="text-[8px] uppercase tracking-wider border border-gray-600 text-gray-400 px-1 leading-tight rounded">${itemCat}</span>`;

                let unitLabel = '(unit)';
                if (food.unitWeight != null && !isNaN(food.unitWeight)) {
                    unitLabel = `(unit: ${food.unitWeight}g)`;
                }

                list.innerHTML += `
                    <div id="item-${food.id}" class="bg-gray-900 rounded-lg border border-gray-700">
                        <div class="flex justify-between items-stretch p-3">
                            <div class="flex-1 cursor-pointer" onclick="triggerAddWeight('${food.id}')">
                                <div class="font-bold text-emerald-400 text-lg">${primaryName}</div>
                                ${secondaryName ? `<div class="text-xs text-gray-400 mb-1 mt-0.5">${secondaryName}</div>` : ''}
                                <div class="text-xs text-gray-500 font-mono">
                                    ${food.calPer100 != null ? `<div>${food.calPer100} kcal | ${food.protPer100 || 0}g prot <span class="text-gray-700">(100g)</span></div>` : ''}
                                    ${food.calPerUnit != null ? `<div>${food.calPerUnit} kcal | ${food.protPerUnit || 0}g prot <span class="text-gray-700">${unitLabel}</span></div>` : ''}
                                </div>
                            </div>
                            <div class="flex flex-col items-end justify-between ml-2">
                                ${badgeHtml}
                                <button onclick="toggleItemMenu('${food.id}')" class="text-gray-500 hover:text-white text-sm transition">⚙</button>
                            </div>
                        </div>
                        <div id="menu-${food.id}" class="hidden border-t border-gray-700 flex gap-2 p-2">
                            <button onclick="editFood('${food.id}')" class="flex-1 bg-blue-600/20 text-blue-400 py-2 rounded-lg text-sm font-bold hover:bg-blue-600/40 transition">✏ Edit</button>
                            <button onclick="deleteFromDb('${food.id}')" class="flex-1 bg-red-600/20 text-red-400 py-2 rounded-lg text-sm font-bold hover:bg-red-600/40 transition">✕ Delete</button>

                        </div>
                    </div>
                `;
            });

            document.body.setAttribute('data-theme', theme);
            ['dark', 'light', 'pink', 'red'].forEach(t => {
                const btn = document.getElementById(`theme-btn-${t}`);
                if (!btn) return;
                btn.classList.toggle('ring-2', t === theme);
                btn.classList.toggle('ring-emerald-400', t === theme);
                btn.classList.toggle('ring-offset-1', t === theme);

            if (uploadToCloud && currentUser) {
                await supabaseClient.from('profiles').update({ theme: theme }).eq('id', currentUser.id);
            }
        }

        // --- ACCENT COLOR ENGINE (Updated for Cloud Storage) ---
        async function setAccent(type, colorName, uploadToCloud = true) {
            const shades = pastelPalettes[colorName];
            if (!shades) return;
            
            document.documentElement.style.setProperty(`--color-${type}-400`, shades[400]);
            document.documentElement.style.setProperty(`--color-${type}-500`, shades[500]);
            document.documentElement.style.setProperty(`--color-${type}-600`, shades[600]);
            
            localStorage.setItem(`${type}Accent`, colorName);

            const allColors = ['green', 'mint', 'blue', 'indigo', 'purple', 'pink', 'rose', 'peach'];
            allColors.forEach(c => {
                const btn = document.getElementById(`btn-${type}-${c}`);
                if (btn) {
                    if (c === colorName) {
                        btn.classList.add('ring-2', 'ring-white', 'ring-offset-2', 'ring-offset-gray-800', 'scale-110');
                    } else {
                        btn.classList.remove('ring-2', 'ring-white', 'ring-offset-2', 'ring-offset-gray-800', 'scale-110');
                    }
                }
            });

            if (uploadToCloud && currentUser) {
                const payload = {};
                payload[type === 'primary' ? 'primary_accent' : 'secondary_accent'] = colorName;
                await supabaseClient.from('profiles').update(payload).eq('id', currentUser.id);
            }
        }

        const scrollContainer = document.querySelector('#app-container > div');
        scrollContainer.addEventListener('scroll', function() {
            const btn = document.getElementById('scroll-top-btn');
            if (!btn) return;
            if (scrollContainer.scrollTop > 350) btn.classList.remove('hidden');
            else btn.classList.add('hidden');
        });

        function scrollToTop() {
            const scrollContainer = document.querySelector('#app-container > div');
            scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function getUniqueBrands() {
            const brands = db.map(item => item.brand).filter(b => b && b.trim() !== '');
            return [...new Set(brands)].sort((a, b) => a.localeCompare(b));
        }

        function showBrandDropdown(prefix) {
            const input = document.getElementById(`${prefix}-brand`);
            renderBrandDropdown(prefix, input.value);
        }

        function filterBrands(prefix) {
            const input = document.getElementById(`${prefix}-brand`);
            renderBrandDropdown(prefix, input.value);
        }

        function renderBrandDropdown(prefix, filterText) {
            const dropdown = document.getElementById(`${prefix}-brand-dropdown`);
            let brands = getUniqueBrands();
            if (filterText) brands = brands.filter(b => b.toLowerCase().includes(filterText.toLowerCase()));
            if (brands.length === 0) {
                dropdown.classList.add('hidden');
                return;
            }
            dropdown.innerHTML = brands.map(b => {
                const safeBrand = b.replace(/'/g, "\\'"); 
                return `<div class="px-3 py-2 text-sm text-gray-300 hover:bg-gray-700 hover:text-emerald-400 cursor-pointer transition border-b border-gray-700 last:border-0" onmousedown="selectBrand('${prefix}', '${safeBrand}')">${b}</div>`;
            }).join('');
            dropdown.classList.remove('hidden');
        }

        function selectBrand(prefix, brandName) {
            const input = document.getElementById(`${prefix}-brand`);
            const dropdown = document.getElementById(`${prefix}-brand-dropdown`);
            input.value = brandName;
            dropdown.classList.add('hidden');
            input.blur(); 
        }

        document.addEventListener('mousedown', function(e) {
            const newBrandDropdown = document.getElementById('new-brand-dropdown');
            const editBrandDropdown = document.getElementById('edit-brand-dropdown');
            if (newBrandDropdown && !e.target.closest('#new-brand') && !e.target.closest('#new-brand-dropdown')) {
                newBrandDropdown.classList.add('hidden');
            }
            if (editBrandDropdown && !e.target.closest('#edit-brand') && !e.target.closest('#edit-brand-dropdown')) {
                editBrandDropdown.classList.add('hidden');
            }
        });

        function switchTab(tabId) {
            ['home', 'db', 'custom', 'new', 'settings'].forEach(id => {
                document.getElementById(`screen-${id}`).classList.add('hidden');
                document.getElementById(`screen-${id}`).classList.remove('block');
                const btn = document.getElementById(`tab-${id}`);
                btn.classList.remove('text-emerald-400');
                btn.classList.add('text-gray-500');
            });

            document.getElementById(`screen-${tabId}`).classList.remove('hidden');
            document.getElementById(`screen-${tabId}`).classList.add('block');
            
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.remove('text-gray-500');
            activeBtn.classList.add('text-emerald-400');

            const header = document.getElementById('app-header-title');
            const version = document.getElementById('app-version');
            
            if (tabId === 'home') {
                header.innerText = "CALculator";
                version.classList.remove('hidden');
            } else if (tabId === 'db') {
                header.innerText = "Food Database";
                version.classList.add('hidden');
            } else if (tabId === 'custom') {
                header.innerText = "Custom Entry";
                version.classList.add('hidden');
            } else if (tabId === 'new') {
                header.innerText = "Create Food";
                version.classList.add('hidden');
            } else if (tabId === 'settings') {
                header.innerText = "Settings";
                version.classList.add('hidden');
            }
            document.querySelector('#app-container > div').scrollTo(0, 0);
        }

        const pastelPalettes = {
            green:  { 400: '134 239 172', 500: '74 222 128', 600: '34 197 94' },
            mint:   { 400: '94 234 212',  500: '45 212 191', 600: '20 184 166' },
            blue:   { 400: '147 197 253', 500: '96 165 250', 600: '59 130 246' },
            indigo: { 400: '165 180 252', 500: '129 140 248', 600: '99 102 241' },
            purple: { 400: '216 180 254', 500: '192 132 252', 600: '168 85 247' },
            pink:   { 400: '249 168 212', 500: '244 114 182', 600: '236 72 153' },
            rose:   { 400: '253 164 175', 500: '251 113 133', 600: '244 63 94' },
            peach:  { 400: '253 186 116', 500: '251 146 60',  600: '249 115 22' }
        };

        // --- AUTHENTICATION & SESSIONS ---
        async function handleSignUp() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const displayName = document.getElementById('auth-name').value.trim();
            
            if (!email || !password || !displayName) return showAuthError("Please enter an email, password, and display name.");

            const { data: authData, error: authError } = await supabaseClient.auth.signUp({ email, password });
            if (authError) return showAuthError(authError.message);

            const newHouseholdId = crypto.randomUUID();

            const { error: hhError } = await supabaseClient
                .from('households')
                .insert([{ id: newHouseholdId }]);
                
            if (hhError) {
                console.error("Household Error:", hhError);
                return showAuthError("DB Error (Household): " + hhError.message);
            }
            
            const { error: profileError } = await supabaseClient
                .from('profiles')
                .insert([{ id: authData.user.id, household_id: newHouseholdId, email: email, display_name: displayName }]);

            if (profileError) {
                console.error("Profile Error:", profileError);
                return showAuthError("DB Error (Profile): " + profileError.message);
            }

            checkSession();
        }

        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                showAuthError(error.message);
            } else {
                checkSession();
            }
        }

        function showAuthError(msg) {
            const errorDiv = document.getElementById('auth-error');
            errorDiv.innerText = msg;
            errorDiv.classList.remove('hidden');
        }

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (session) {
                currentUser = session.user;
                
                const { data: profile } = await supabaseClient.from('profiles')
                    .select('household_id, theme, primary_accent, secondary_accent, display_name')
                    .eq('id', currentUser.id)
                    .single();
                    
                currentHousehold = profile?.household_id;
                document.getElementById('my-household-id').value = currentHousehold || 'Error loading ID';

                const nameLabel = document.getElementById('display-name-label');
                if (nameLabel) nameLabel.innerText = profile?.display_name || currentUser.email;

                if (profile?.theme) applyTheme(profile.theme, false);
                if (profile?.primary_accent) setAccent('primary', profile.primary_accent, false);
                if (profile?.secondary_accent) setAccent('secondary', profile.secondary_accent, false);

                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                
                fetchFoods();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }

            const loader = document.getElementById('loading-screen');
            if (loader && !loader.classList.contains('hidden')) {
                loader.classList.add('opacity-0');
                setTimeout(() => loader.classList.add('hidden'), 300);
            }
        }

        async function logOut() {
            await supabaseClient.auth.signOut();
            db = [];
            renderDb();
            checkSession();
        }

        function loadAccents() {
            const savedPrimary = localStorage.getItem('primaryAccent') || 'mint';
            const savedSecondary = localStorage.getItem('secondaryAccent') || 'pink';
            setAccent('primary', savedPrimary, false);
            setAccent('secondary', savedSecondary, false);
        }

        // --- HOUSEHOLD SHARING LOGIC ---
        async function copyHouseholdId() {
            if (!currentHousehold) return;
            try {
                await navigator.clipboard.writeText(currentHousehold);
                alert("Household ID copied to clipboard!");
            } catch (err) {
                console.error("Failed to copy", err);
            }
        }

        async function joinHousehold() {
            const newId = document.getElementById('join-household-id').value.trim();
            if (!newId) return alert("Please enter a Household ID.");
            
            if (newId === currentHousehold) return alert("You are already in this household.");

            if (!confirm("Are you sure you want to join this household? You will lose access to your current personal food database.")) return;

            const { error } = await supabaseClient.rpc('join_household', { target_household_id: newId });

            if (!error) {
                alert("Successfully joined new household!");
                document.getElementById('join-household-id').value = '';
                checkSession(); 
            } else {
                alert("Failed to join household. Please ensure the ID is valid.");
                console.error(error);
            }
        }

        // --- SEARCH BAR LOGIC ---
        function handleSearch() {
            const searchInput = document.getElementById('search-db');
            const clearBtn = document.getElementById('clear-search-btn');
            
            if (searchInput.value.length > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }
            
            renderDb();
        }

        function clearSearch() {
            const searchInput = document.getElementById('search-db');
            const clearBtn = document.getElementById('clear-search-btn');
            
            searchInput.value = '';
            clearBtn.classList.add('hidden');
            renderDb();
            
            searchInput.focus(); 
        }

        // --- PLATE EDITING LOGIC ---
        let currentPlateEditId = null;

        function openPlateEdit(plateId) {
            document.getElementById('main-scroll').classList.add('overflow-hidden');
            const item = dailyLog[activeCategory][activeMealId].items.find(p => p.id === plateId);
            if (!item) return;
            
            if (item.calMultiplier == null) {
                alert("This is an older entry format. Please remove and re-add it to edit.");
                return;
            }

            currentPlateEditId = plateId;
            document.getElementById('plate-edit-title').innerText = item.baseName;
            document.getElementById('plate-edit-label').innerText = item.mode === 'grams' ? 'Grams' : 'Units';
            document.getElementById('plate-edit-input').value = item.amount;
            
            document.getElementById('plate-edit-modal').classList.remove('hidden');
            document.getElementById('plate-edit-input').focus();
        }

        function closePlateEditModal() {
            document.getElementById('main-scroll').classList.remove('overflow-hidden');
            document.getElementById('plate-edit-modal').classList.add('hidden');
            currentPlateEditId = null;
        }

        function savePlateEdit() {
            if (!currentPlateEditId) return;
            const newAmount = parseFloat(document.getElementById('plate-edit-input').value);
            if (!newAmount || isNaN(newAmount)) {
                alert("Please enter a valid amount.");
                return;
            }

            const itemIndex = dailyLog[activeCategory][activeMealId].items.findIndex(p => p.id === currentPlateEditId);
            if (itemIndex === -1) return;
            
            const item = dailyLog[activeCategory][activeMealId].items[itemIndex];
            
            item.amount = newAmount;
            item.totalCal = newAmount * item.calMultiplier;
            item.totalProt = newAmount * item.protMultiplier;
            
            const entryLabel = item.mode === 'grams' ? `${newAmount}g` : (newAmount === 1 ? '1 unit' : `${newAmount} units`);
            item.name = `${item.baseName} (${entryLabel})`;

            closePlateEditModal();
            saveState();
        }

        document.getElementById('plate-edit-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') savePlateEdit();
        });

        // --- TWO-TIER NAVIGATION LOGIC ---
        function switchCategory(cat) {
            activeCategory = cat;
            const mealsInCat = Object.keys(dailyLog[cat]);
            activeMealId = mealsInCat.length > 0 ? mealsInCat[0] : null; // Auto-select first meal, or null if empty
            saveState();
        }

        function switchMeal(id) {
            activeMealId = id;
            saveState();
        }

        function renameMeal() {
            const currentTitle = dailyLog[activeCategory][activeMealId].title;
            const newTitle = prompt("Enter new meal name:", currentTitle);
            if (newTitle && newTitle.trim() !== '') {
                dailyLog[activeCategory][activeMealId].title = newTitle.trim();
                saveState();
            }
        }

        function duplicateMeal() {
            const currentMeal = dailyLog[activeCategory][activeMealId];
            const newId = 'meal_' + Date.now();
            
            // Figure out the base name without existing (2) or (3) tags
            let baseName = currentMeal.title.replace(/\s*\(\d+\)$/, '');
            
            // Get all existing titles in this category to avoid collisions
            let existingTitles = Object.values(dailyLog[activeCategory]).map(m => m.title);
            
            let counter = 2;
            let newTitle = `${baseName} (${counter})`;
            
            // Keep incrementing until we find an available number
            while (existingTitles.includes(newTitle)) {
                counter++;
                newTitle = `${baseName} (${counter})`;
            }
            
            const clonedItems = JSON.parse(JSON.stringify(currentMeal.items)).map(item => {
                item.id = Date.now() + Math.random(); 
                return item;
            });
            
            dailyLog[activeCategory][newId] = { title: newTitle, items: clonedItems };
            activeMealId = newId;
            saveState();
        }

        function smartDeleteMeal() {
            const mealsInCat = Object.keys(dailyLog[activeCategory]);

            if (mealsInCat.length > 1) {
                if(confirm("Are you sure you want to delete this meal tab?")) {
                    delete dailyLog[activeCategory][activeMealId];
                    const remainingMeals = Object.keys(dailyLog[activeCategory]);
                    activeMealId = remainingMeals[0];
                    
                    if (remainingMeals.length === 1) {
                        dailyLog[activeCategory][remainingMeals[0]].title = `My ${activeCategory}`;
                    }
                    
                    saveState();
                }
            } else {
                if(confirm("Clear all items from this meal?")) {
                    dailyLog[activeCategory][activeMealId].items = [];
                    
                    dailyLog[activeCategory][activeMealId].title = `My ${activeCategory}`;
                    
                    saveState();
                }
            }
        }

        function createNewMeal() {
            const newId = 'meal_' + Date.now();
            let baseName = `My ${activeCategory}`;
            let existingTitles = Object.values(dailyLog[activeCategory]).map(m => m.title);
            
            let newTitle = baseName;
            let counter = 2;
            
            while (existingTitles.includes(newTitle)) {
                newTitle = `${baseName} (${counter})`;
                counter++;
            }
            
            dailyLog[activeCategory][newId] = { title: newTitle, items: [] };
            activeMealId = newId;
            saveState();
        }

        // --- CLEAR ALL LOGIC ---
        function clearAllMeals() {
            if(!confirm("Are you sure you want to clear all foods and reset all tabs across every category?")) return;

            const currentCategories = Object.keys(dailyLog);
            
            dailyLog = {};
            
            currentCategories.forEach(cat => {
                dailyLog[cat] = {};
                const mealId = 'meal_' + Date.now() + Math.random();
                dailyLog[cat][mealId] = { title: `My ${cat}`, items: [] };
            });
            
            activeCategory = currentCategories[0];
            activeMealId = Object.keys(dailyLog[activeCategory])[0]; 
            
            saveState();
        }
        
        loadAccents();
        checkSession();
        renderAll();
        applyTheme(currentTheme);

        const bottomNav = document.getElementById('bottom-nav');

        document.addEventListener('focusin', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
                bottomNav.classList.add('hidden');
            }
        });

        document.addEventListener('focusout', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
                setTimeout(() => {
                    const active = document.activeElement;
                    if (active && active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA' && active.tagName !== 'SELECT') {
                        bottomNav.classList.remove('hidden');
                    }
                }, 300);
            }
        });
    </script>
